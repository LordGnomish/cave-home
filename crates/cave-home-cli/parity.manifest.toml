# cave-home-cli — first-party manifest (no upstream port).
#
# `cavehomectl` is the advanced power-user CLI mandated by ADR-005 §2
# and the only sanctioned written-text surface that surfaces the
# cluster underneath the home-world UX (ADR-007). It has no upstream
# port — it is shaped by the cave-home Portal commands one-for-one
# so the OS image, Portal "Add node" wizard, and `cavehomectl` all
# call the same primitives.
#
# `port_method = "first-party"` therefore. `fill_ratio` and
# `test_port_ratio` are not meaningful (no upstream baseline); we
# emit a separate `subcommand_coverage` table that tracks how much
# of the documented surface is implemented vs. stubbed.

[crate]
name             = "cave-home-cli"
upstream_repo    = "none"
port_method      = "first-party"
upstream_license = "n/a"
ported_at        = "2026-05-25"
linux_min_kernel = "7.1"

[ratios]
# Not applicable; first-party. Reported as 1.0 by convention so the
# crate is not flagged as "incomplete" against the upstream-port
# pipeline.
fill_ratio              = 1.0
adr_justified_ratio = 1.00  # measured: every [[unmapped]]/[[scope_cut]] entry carries both priority and note
honest_ratio        = 1.00  # computed: fill / (fill + (1-fill)*(1-adr_justified))
fill_ratio_basis        = "first-party — no upstream port; coverage tracked via subcommand_coverage"
test_port_ratio         = 1.0

# ---- subcommand_coverage — implementation status per top-level verb ---------

[[subcommand_coverage]]
verb   = "init"
status = "implemented"
owner  = "F5"

[[subcommand_coverage]]
verb   = "join"
status = "implemented"
owner  = "F5"

[[subcommand_coverage]]
verb   = "status"
status = "implemented"
owner  = "F5"

[[subcommand_coverage]]
verb   = "destroy"
status = "implemented"
owner  = "F5"

[[subcommand_coverage]]
verb   = "device"
status = "implemented"
owner  = "F5"

[[subcommand_coverage]]
verb   = "room"
status = "implemented"
owner  = "F5"
note   = "Added 2026-05-25 — `room list` + `room show <name>` (case-insensitive)."

[[subcommand_coverage]]
verb   = "automation"
status = "implemented"
owner  = "F5"

