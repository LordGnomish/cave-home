[package]
name              = "cave-home-traefik-rs"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace   = true
description = "cave-home-traefik-rs — ingress routing-decision core + real HTTP/HTTPS reverse-proxy & Kubernetes-Ingress runtime (K3s default; optional in cave-home); upstream: traefik/traefik (MIT); port method: spec-based behavioural reimplementation of documented routing semantics (Orchestration Phase 4, ADR-004)"

[package.metadata.cave-home]
upstream    = "traefik/traefik"
port-method = "spec-based"
phase       = "orchestration-phase-4"
optional    = true

# The `runtime` feature (default-on) adds the real async listener + reverse
# proxy + ACME + provider runtime. With `--no-default-features` the crate is
# the std-only routing-decision core it has always been: zero dependencies.

[features]
default = ["runtime"]
runtime = [
    "dep:tokio",
    "dep:hyper",
    "dep:hyper-util",
    "dep:http",
    "dep:http-body-util",
    "dep:bytes",
    "dep:futures-util",
    "dep:tokio-rustls",
    "dep:rustls",
    "dep:rustls-pemfile",
    "dep:rustls-pki-types",
    "dep:rcgen",
    "dep:ring",
    "dep:base64",
    "dep:sha1",
    "dep:sha2",
    "dep:subtle",
    "dep:flate2",
    "dep:serde",
    "dep:serde_json",
    "dep:prometheus-client",
    "dep:percent-encoding",
]

[dependencies]
tokio             = { version = "1", default-features = false, features = ["rt-multi-thread", "net", "io-util", "sync", "time", "macros"], optional = true }
hyper             = { version = "1", default-features = false, features = ["server", "client", "http1"], optional = true }
hyper-util        = { version = "0.1", default-features = false, features = ["tokio"], optional = true }
http              = { version = "1", optional = true }
http-body-util    = { version = "0.1", optional = true }
bytes             = { version = "1", optional = true }
futures-util      = { version = "0.3", default-features = false, optional = true }
tokio-rustls      = { version = "0.26", default-features = false, features = ["ring", "tls12"], optional = true }
rustls            = { version = "0.23", default-features = false, features = ["ring", "std", "tls12"], optional = true }
rustls-pemfile    = { version = "2", optional = true }
rustls-pki-types  = { version = "1", optional = true }
rcgen             = { version = "0.13", default-features = false, features = ["ring", "pem"], optional = true }
ring              = { version = "0.17", optional = true }
base64            = { version = "0.22", optional = true }
sha1              = { version = "0.10", optional = true }
sha2              = { version = "0.10", optional = true }
subtle            = { version = "2", optional = true }
flate2            = { version = "1", optional = true }
serde             = { version = "1", features = ["derive"], optional = true }
serde_json        = { version = "1", optional = true }
prometheus-client = { version = "0.23", optional = true }
percent-encoding  = { version = "2", optional = true }

[dev-dependencies]
tokio = { version = "1", default-features = false, features = ["rt-multi-thread", "net", "io-util", "sync", "time", "macros"] }

[lints]
workspace = true
