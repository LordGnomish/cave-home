# cave-home-traefik-rs — parity manifest.
#
# Phase 1 ships the ingress *routing-decision core*: the reverse-proxy routing
# brain, std-only and fully deterministic. That is — the Traefik-style rule
# parser + evaluator (Host / Path / PathPrefix / Header / Method with
# && / || / ! / parentheses), priority-based router selection (default
# priority = rule length, deterministic tie-break), the service + weighted /
# sticky / health-aware load-balancer selection, the typed middleware chain
# (StripPrefix / AddPrefix / RedirectScheme / Headers transforms, plus
# BasicAuth / RateLimit *config* modelling), and a validated dynamic-config
# snapshot with reference checking.
#
# This crate is INFRASTRUCTURE (ADR-004, K3s ingress layer). It is hidden from
# end-users (Charter §6.3) and produces NO user-facing strings.
#
# What is NOT in this crate (network/clock/crypto-bound; all phase-1b, each
# dispositioned below): the actual TCP/TLS listener + byte-level proxying,
# ACME / TLS certificate management, the dynamic provider watchers (file /
# Kubernetes CRD / Docker), the BasicAuth credential crypto, and the RateLimit
# token-bucket runtime.
#
# Port method: HONEST spec-based behavioural reimplementation of the documented
# Traefik v3 routing semantics from public Traefik documentation. This is NOT a
# verbatim line-by-line port of Traefik's Go (ANTLR-derived) matcher engine; no
# Traefik source was transcribed. Traefik upstream is MIT-licensed
# (Apache-2.0-compatible, permissive); the cave-home tree stays Apache-2.0.

[crate]
name             = "cave-home-traefik-rs"
upstream_repo    = "traefik/traefik"
upstream_subpath = "pkg/server/router, pkg/server/service, pkg/middlewares (behavioural reference only)"
port_method      = "spec-based behavioural reimplementation (NOT verbatim line-by-line)"
upstream_license = "MIT (Apache-2.0-compatible, permissive)"
spec_sources     = [
    "Traefik routing — HTTP routers & rule syntax: https://doc.traefik.io/traefik/routing/routers/",
    "Traefik default router priority = len(rule): https://doc.traefik.io/traefik/routing/routers/#priority",
    "Traefik services — weighted round-robin & sticky sessions: https://doc.traefik.io/traefik/routing/services/",
    "Traefik middlewares — StripPrefix / AddPrefix / RedirectScheme / Headers: https://doc.traefik.io/traefik/middlewares/overview/",
    "Traefik dynamic configuration model (routers/services/middlewares by name): https://doc.traefik.io/traefik/providers/overview/",
    "Traefik kubernetes-ingress provider — Ingress -> routers/services translation, pathType, ingressClassName, TLS, defaultBackend: https://doc.traefik.io/traefik/providers/kubernetes-ingress/",
    "Kubernetes Ingress API (networking.k8s.io/v1) — rules/paths/pathType/backend/defaultBackend/tls/ingressClassName: https://kubernetes.io/docs/concepts/services-networking/ingress/",
    "Traefik kubernetes-gateway provider — HTTPRoute -> routers/services, matches/backendRefs/weight: https://doc.traefik.io/traefik/providers/kubernetes-gateway/",
    "Gateway API HTTPRoute (gateway.networking.k8s.io/v1) — hostnames/rules/matches (path/method/headers)/weighted backendRefs: https://gateway-api.sigs.k8s.io/api-types/httproute/",
    "RFC 9110 §5.1 (field names case-insensitive), §5.2 (multi-value header join)",
]
ported_at        = "2026-05-29"
linux_min_kernel = "7.1"

[ratios]
# fill_ratio is against the FULL ingress scope (decision core + TCP/TLS
# listener + ACME + provider watchers + byte-level proxying + auth/ratelimit
# runtimes). The decision core is implemented and tested in full; the
# network/clock/crypto-bound remainder is all ADR-004 phase-1b, each
# dispositioned below.
fill_ratio              = 0.40
fill_ratio_basis        = "rule parser+evaluator, router priority selection, service/load-balancer selection (WRR + sticky + health-skip), middleware-chain transforms, validated dynamic-config, the Kubernetes Ingress -> routers/services translation (pathType, ingressClassName, TLS, defaultBackend), and the Gateway API HTTPRoute -> routers/weighted-services translation (hostnames, path/method/header matches, weighted backendRefs) — all implemented & tested; the provider *watch loops* + endpoint resolution, plus listener/ACME/proxying/auth-crypto/ratelimit-runtime, deferred"
test_port_ratio         = 0.0   # tests designed from spec, not ported from upstream
adr_justified_ratio     = 1.00  # every unfilled item below carries an ADR-004 phase disposition
honest_ratio            = 1.00  # 0.40 / (0.40 + (1-0.40)*(1-1.00)) = 1.00

# ---- mapped (real, tested implementation present in this crate) ------------

[[mapped]]
spec = "Traefik rule grammar parse: Host/Path/PathPrefix/Header/Method + && / || / ! / parentheses (hand-rolled lexer+recursive-descent parser, no regex)"
ours = "src/rule.rs::parse"

[[mapped]]
spec = "Rule evaluation against a request (host/path/method/headers); multi-arg matchers OR together; segment-aware PathPrefix; case-insensitive host/method/header-name"
ours = "src/matcher.rs::matches"

[[mapped]]
spec = "Default router priority = len(rule); explicit priority override"
ours = "src/rule.rs::Rule::default_priority + src/router.rs::Router::effective_priority"

[[mapped]]
spec = "Highest-priority matching router wins; deterministic tie-break; entrypoint filtering"
ours = "src/router.rs::select"

[[mapped]]
spec = "Service + weighted round-robin load-balancer selection (deterministic by caller-supplied counter)"
ours = "src/loadbalancer.rs::Service::pick_round_robin"

[[mapped]]
spec = "Sticky-session selection by cookie; fall back + re-assign cookie when pinned server is gone/unhealthy"
ours = "src/loadbalancer.rs::Service::pick_sticky"

[[mapped]]
spec = "Health-aware server pool: unhealthy / zero-weight servers skipped"
ours = "src/loadbalancer.rs::Service::{healthy,pick_round_robin}"

[[mapped]]
spec = "Middleware chain apply in order, with short-circuit on terminal response"
ours = "src/middleware.rs::MiddlewareChain::apply"

[[mapped]]
spec = "StripPrefix / AddPrefix / RedirectScheme / Headers request+response transforms"
ours = "src/middleware.rs::Middleware::apply_one"

[[mapped]]
spec = "Dynamic-config snapshot model + reference validation (dangling service/middleware, duplicate names, empty service)"
ours = "src/config.rs::DynamicConfig::build"

[[mapped]]
spec = "Request/response descriptor with RFC-9110 case-insensitive header handling"
ours = "src/request.rs::{RequestDescriptor,ResponseDescriptor}"

[[mapped]]
spec = "Kubernetes Ingress (networking.k8s.io/v1) -> routers/services translation: per-(host,path) router rule, pathType (Exact->Path, Prefix/ImplementationSpecific->PathPrefix), <ns>-<service>-<port> service id, spec.tls host coverage (wildcard on empty hosts), lowest-priority defaultBackend catch-all, ingressClassName filtering, backend dedup + multi-ingress merge"
ours = "src/ingress.rs::{Ingress::translate, translate_ingresses, Translation::into_config}"

[[mapped]]
spec = "Gateway API HTTPRoute (gateway.networking.k8s.io/v1) -> routers/services translation: per-(rule,match) router (path/method/headers AND-combined, matches OR per rule), hostnames -> multi-value Host(...) clause, path Exact->Path / PathPrefix->PathPrefix, empty-match catch-all, weighted backendRefs -> one weighted-round-robin service, multi-route merge"
ours = "src/gateway.rs::{HttpRoute::translate, translate_routes, GatewayTranslation::into_config}"

# ---- unmapped (NOT in this crate; ADR-004 phase disposition) ---------------

[[unmapped]]
area     = "TCP/TLS entrypoint listener + byte-level reverse proxying"
priority = "phase-1b"
note     = "ADR-004: the decision core is I/O-free on purpose. The actual listener (accept sockets, parse HTTP, stream bytes to the chosen backend) is network-bound and lands when the orchestration listener layer is wired. It consumes this crate's RequestDescriptor -> Route decision."

[[unmapped]]
area     = "ACME / TLS certificate management (Let's Encrypt, cert resolvers)"
priority = "phase-1b"
note     = "ADR-004: automatic certificate provisioning + renewal is network- and disk-bound and depends on the listener. The Router only carries a tls on/off flag here; cert acquisition is deferred."

[[unmapped]]
area     = "Dynamic provider watch loops + endpoint resolution (file / Kubernetes Ingress+CRD / Docker labels)"
priority = "phase-1b"
note     = "ADR-004: the *pure translation* half of both the Kubernetes Ingress provider (src/ingress.rs) and the Gateway API HTTPRoute provider (src/gateway.rs) now lands (Ingress/HTTPRoute -> routers/services). What remains deferred is the I/O- and cluster-bound half: the watch loops that list/watch Ingress / HTTPRoute objects from the API server, the endpoint resolution that turns a backend Service+port into real server URLs ({Translation,GatewayTranslation}::into_config take a caller-supplied resolver so the translation stays std-only), and the other providers (file / Docker, plus GRPCRoute/TLSRoute/TCPRoute). These land with the orchestration provider layer."

[[unmapped]]
area     = "BasicAuth credential verification (htpasswd / constant-time hash compare)"
priority = "phase-1b"
note     = "ADR-004: the credential crypto is modelled as config here (realm + user refs) but the actual verification is deferred to the listener phase, where the request body/headers are real and a crypto dep is justified. Keeping crypto out of the decision core keeps it std-only and deterministic."

[[unmapped]]
area     = "RateLimit token-bucket runtime enforcement"
priority = "phase-1b"
note     = "ADR-004: rate limiting needs a clock + per-source state, both runtime concerns. The configured average/burst is modelled here; the enforcing token bucket lands with the listener so the decision core stays clock-free and deterministic."

[[unmapped]]
area     = "Verbatim line-by-line parity with Traefik's Go matcher engine"
priority = "permanent"
note     = "Charter §6 HONEST-port stance: this crate is a spec-based behavioural reimplementation of documented Traefik routing semantics, NOT a transcription of Traefik's ANTLR-derived Go matcher. The remaining rule features Traefik exposes but cave-home does not yet model (HostRegexp, Query, ClientIP, HeaderRegexp, HostSNI for TCP) are deferred; per Charter §7/§8 we ship the current documented semantics with no legacy compat mode."

[[unmapped]]
area     = "Additional matchers: HostRegexp / HeaderRegexp / Query / ClientIP / HostSNI(TCP)"
priority = "phase-2"
note     = "ADR-004: the implemented matcher set covers the common HTTP routing cases. Regexp matchers would reintroduce a regex engine (deliberately avoided in the parser per the no-regex constraint); TCP HostSNI belongs with the TCP listener. Added incrementally over the same parser/evaluator."

[[unmapped]]
area     = "Gateway API: HTTPRoute filters (RequestHeaderModifier / RequestRedirect / URLRewrite / mirror) and the GRPCRoute / TLSRoute / TCPRoute / UDPRoute kinds"
priority = "phase-2"
note     = "ADR-004: the HTTPRoute *match -> router* + weighted-backend translation lands now (src/gateway.rs). HTTPRoute filters map onto the existing middleware chain (RequestHeaderModifier -> Headers, RequestRedirect -> RedirectScheme, URLRewrite -> StripPrefix/AddPrefix) and are added incrementally over that machinery; the regexp path-match type maps to the deferred HostRegexp/HeaderRegexp matchers above. GRPCRoute is HTTPRoute-shaped; TLSRoute/TCPRoute/UDPRoute belong with the TCP/UDP listener (phase-1b)."

# ---- spec_test (designed from public Traefik docs / RFC behaviour) ---------

[[spec_test]]
designed_for = "Rule grammar parse for each matcher + && / || / ! / parentheses + precedence (AND binds tighter than OR) + malformed-rule rejection"
ours         = "src/rule.rs::tests"

[[spec_test]]
designed_for = "Rule evaluation: per-matcher semantics, segment-aware PathPrefix, case-insensitivity, combinator + precedence + parenthesised-grouping results"
ours         = "src/matcher.rs::tests"

[[spec_test]]
designed_for = "Priority selection: longest rule wins by default, explicit priority override, deterministic name tie-break, entrypoint filtering"
ours         = "src/router.rs::tests"

[[spec_test]]
designed_for = "Load balancer: round-robin cycling, proportional weighted distribution, unhealthy + zero-weight skip, sticky pin / fall-back / cookie assignment"
ours         = "src/loadbalancer.rs::tests"

[[spec_test]]
designed_for = "Middleware transforms: StripPrefix (segment-aware), AddPrefix, RedirectScheme (302/301 + port + short-circuit), Headers, chain ordering"
ours         = "src/middleware.rs::tests"

[[spec_test]]
designed_for = "Dynamic-config reference validation: dangling service/middleware, duplicate router/service names, empty service, end-to-end route resolution"
ours         = "src/config.rs::tests"

[[spec_test]]
designed_for = "RFC-9110 case-insensitive header lookup + method/host/scheme normalisation"
ours         = "src/request.rs::tests"

[[spec_test]]
designed_for = "Ingress translation: service id (numeric/named port), ingressClassName filtering, host+path/host-only/path-only rule construction, pathType -> matcher mapping, empty-rule/empty-service/zero-port/unparseable-rule rejection, multi-path distinct routers + backend dedup, spec.tls host/wildcard coverage, defaultBackend lowest-priority catch-all, translate_ingresses merge, into_config end-to-end routability + empty-endpoint rejection"
ours         = "src/ingress.rs::tests"

[[spec_test]]
designed_for = "HTTPRoute translation: host+path/exact-path/multi-hostname/method+header rule construction, empty-match catch-all, host-only match, multiple matches -> multiple routers sharing one service, no-backend/empty-name/zero-port/unparseable-rule rejection, weighted-backendRef distribution via into_config, end-to-end routability, translate_routes merge"
ours         = "src/gateway.rs::tests"
