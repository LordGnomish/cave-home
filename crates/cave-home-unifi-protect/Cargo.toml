[package]
name              = "cave-home-unifi-protect"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace   = true
description = "cave-home-unifi-protect — UniFi Protect decision brain (cameras, doorbells, smart detections, recording-mode/zone/privacy policy; Phase-1 pure-logic core, transport/video deferred per ADR-009)"

[package.metadata.cave-home]
upstream    = "home-assistant/core (unifiprotect) + public UniFi Protect device/data model"
port-method = "spec-based (detection-policy core)"
adr         = "ADR-009"

# Phase 1 ships the std-only UniFi Protect decision core: the typed device
# models (camera/doorbell/sensor/light/chime/viewer), the smart-detect event
# model + taxonomy, the recording-mode decision, smart-detect zone / line
# arming, doorbell ring + rapid-detection de-dupe, the privacy schedule
# (Charter §9) and the EN/DE/TR grandma-friendly phrasing. The UniFi Protect
# REST bootstrap + binary WebSocket transport, RTSPS stream/recording download,
# thumbnail/snapshot fetch and the cave-home-camera/-core integration are
# network/video-bound and deferred to Phase 1b — see parity.manifest.toml
# [[unmapped]]. The core therefore depends on no external crates.

