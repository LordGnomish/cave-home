# cave-home-cni-flannel — parity manifest.
#
# Phase 1 ships the flannel CNI *decision core*: the subnet-management and
# IPAM brain that K3s pod networking is built on. Concretely this crate
# implements, in pure std (incl. std::net) with no async runtime and no
# kernel/network I/O:
#
#   - CIDR arithmetic (v4 + v6): mask, containment, overlap, subnet split,
#     nth-address — reimplemented on std::net because Rust std has no IPNet.
#   - per-node subnet leasing over a cluster pod CIDR (carve /24s out of a
#     /16, allocate / reserve / release, detect exhaustion).
#   - per-node pod IPAM (allocate / free a pod IP, reserve network + gateway,
#     detect subnet-full).
#   - typed flannel backend config (VXLAN / host-gw / WireGuard) + the
#     per-node backend data peers advertise (VTEP MAC + public IP, etc.).
#   - the route + FDB-entry computation a node must program to reach every
#     peer subnet, given the node→subnet map and the backend.
#   - the CNI ADD / DEL decision + result model (assigned IP, gateway, routes,
#     DNS — the CNI-spec result schema).
#
# The privileged / I/O layer — bringing up the flannel.<vni> VXLAN device,
# programming routes and the FDB via netlink, establishing WireGuard tunnels,
# the long-running flannel daemon watch loop, and the durable subnet-lease
# store (etcd / Kubernetes API) — is deferred to Phase 1b and enumerated in
# [[unmapped]] with a priority + note. The decision core here is what those
# layers drive, and it is exercised entirely by unit tests.
#
# Port method: behavioral reimplementation of *documented* flannel + CNI-spec
# behaviour (public docs, no GPL source read). flannel and the CNI spec are
# Apache-2.0; this crate is Apache-2.0. We do NOT claim a verbatim line-by-line
# port — the original ADR-008 scaffold did, but that overstated provenance for
# logic that is in fact reimplemented from spec. This manifest corrects that.

[crate]
name             = "cave-home-cni-flannel"
upstream_repo    = "flannel-io/flannel"
upstream_license = "Apache-2.0"
port_method      = "behavioral reimplementation from public flannel + CNI-spec docs (std-only decision core)"
spec_sources     = [
    "flannel-io/flannel public docs — Backends.md (VXLAN VNI/Port/DirectRouting; host-gw; wireguard; default UDP port 8472, default VNI 1)",
    "flannel-io/flannel public docs — subnet leasing model (cluster pod CIDR carved into per-node SubnetLen subnets; one lease per node; PublicIP + BackendType + BackendData lease attrs)",
    "flannel cni-plugin public docs — FLANNEL_SUBNET / FLANNEL_NETWORK / FLANNEL_MTU subnet.env contract; host-local IPAM delegation reserving .0 (network) + .1 (gateway)",
    "CNI specification v1.0.0 (containernetworking/cni SPEC.md) — ADD/DEL semantics, idempotent DEL, result schema: ips[].address(ip/prefix)+gateway, routes[].dst+gw, dns.nameservers",
    "RFC 4632 (CIDR / classless IPv4 prefixes) + RFC 4291 (IPv6 addressing) — prefix/mask/containment arithmetic",
    "Linux kernel VXLAN encapsulation overhead (50 bytes: outer Eth 14 + IPv4 20 + UDP 8 + VXLAN 8) for overlay-MTU derivation",
]
ported_at        = "2026-05-29"
linux_min_kernel = "7.1"

[ratios]
# fill_ratio is against the FULL flannel-CNI scope (decision core + datapath
# programming + durable lease store + daemon watch loop + the non-VXLAN
# datapaths). The decision core — CIDR/subnet/IPAM/backend-config/routes/CNI-
# result — is implemented and tested in full. The privileged netlink /
# WireGuard / etcd / daemon machinery is the larger remaining surface and is
# all ADR-008 Phase-1b, enumerated below. Honest measured share ~0.40.
fill_ratio          = 0.40
fill_ratio_basis    = "CIDR math (v4+v6) + per-node subnet leasing + pod IPAM + backend config model + route/FDB computation + CNI ADD/DEL result model, fully implemented & unit-tested; netlink datapath, WireGuard tunnel setup, durable lease store, daemon watch loop deferred"
test_port_ratio     = 0.0   # tests designed from spec/RFC reference values, not ported from upstream Go tests
adr_justified_ratio = 1.00  # every unfilled item below carries a phase disposition (priority + note)
honest_ratio        = 1.00  # 0.40 / (0.40 + (1-0.40)*(1-1.00)) = 1.00

# ---------------------------------------------------------------------------
# Mapped — documented flannel/CNI behaviour → our Rust symbol.
# ---------------------------------------------------------------------------

[[mapped]]
spec = "CIDR prefix/mask/containment/overlap arithmetic (RFC 4632 / RFC 4291) on std::net IpAddr"
ours = "src/cidr.rs::Cidr::{new,netmask,contains,overlaps,address_count}"

[[mapped]]
spec = "Subnet splitting (carve a parent prefix into more-specific subnets) + nth host address"
ours = "src/cidr.rs::Cidr::{subnets,nth_address} + SubnetIter"

[[mapped]]
spec = "CIDR text parse + canonicalisation to network base (host bits cleared)"
ours = "src/cidr.rs::Cidr::from_str + mask_addr"

[[mapped]]
spec = "flannel cluster pod CIDR carved into per-node SubnetLen subnets; one lease per node"
ours = "src/subnet.rs::SubnetManager::{new,capacity,allocate}"

[[mapped]]
spec = "flannel lease acquire idempotent per node; static reservation pins a specific subnet; release frees it"
ours = "src/subnet.rs::SubnetManager::{allocate,reserve,release}"

[[mapped]]
spec = "subnet-pool exhaustion detection + overlap/out-of-cluster/conflict rejection"
ours = "src/subnet.rs::SubnetManager::{is_exhausted} + SubnetError::{Exhausted,NotInCluster,SubnetTaken}"

[[mapped]]
spec = "node→subnet map snapshot feeding the route computation"
ours = "src/subnet.rs::SubnetManager::node_subnet_map"

[[mapped]]
spec = "flannel host-local IPAM: reserve .0 (network) + .1 (gateway), allocate/free remaining host addrs"
ours = "src/ipam.rs::PodIpam::{new,gateway,allocate,free,assign}"

[[mapped]]
spec = "subnet-full detection + reserved/out-of-range/duplicate address rejection"
ours = "src/ipam.rs::PodIpam::{is_full,is_reserved} + IpamError::{SubnetFull,Reserved,OutOfRange,AlreadyAssigned}"

[[mapped]]
spec = "flannel backend types VXLAN/host-gw/wireguard with VXLAN VNI+Port+DirectRouting defaults (8472, VNI 1)"
ours = "src/backend.rs::{BackendConfig,VxlanConfig,WireguardConfig,DEFAULT_VXLAN_PORT,DEFAULT_VNI}"

[[mapped]]
spec = "VXLAN/WireGuard encapsulation overhead → overlay-MTU derivation from link MTU"
ours = "src/backend.rs::{VxlanConfig::overlay_mtu,WireguardConfig::overlay_mtu,ENCAP_OVERHEAD}"

[[mapped]]
spec = "per-node BackendData advertised in the lease (VXLAN: VTEP MAC + public IP; host-gw: next-hop IP; wireguard: pubkey + endpoint)"
ours = "src/backend.rs::NodeBackendData + MacAddr (parse/format 48-bit MAC)"

[[mapped]]
spec = "route list a node installs to reach peer subnets (VXLAN via device + FDB; host-gw via gateway; wireguard via device); DirectRouting same-underlay shortcut; never route own subnet"
ours = "src/routes.rs::compute_route_plan + RoutePlan{routes,fdb}"

[[mapped]]
spec = "join node→subnet + node→backend-data maps into peer leases"
ours = "src/routes.rs::peers_from_maps"

[[mapped]]
spec = "CNI ADD: allocate pod IP, return result (ips[].address ip/prefix, gateway, default route via gateway, dns)"
ours = "src/cni.rs::{cni_add,cni_add_specific,CniResult,IpConfig,CniRoute}"

[[mapped]]
spec = "CNI DEL: free pod IP; DEL is idempotent (deleting an unassigned addr is success)"
ours = "src/cni.rs::cni_del"

# ---------------------------------------------------------------------------
# Unmapped — explicit Phase 1b backlog / permanent out-of-scope. Each carries
# a priority + note so parity_index counts it as honestly accounted.
# ---------------------------------------------------------------------------

[[unmapped]]
area     = "netlink route / FDB programming (RTM_NEWROUTE, AF_BRIDGE RTM_NEWNEIGH)"
priority = "phase-1b"
note     = "ADR-008: the RoutePlan computed in src/routes.rs is pure data; issuing the netlink messages that install those routes + FDB entries is the privileged datapath layer. Needs CAP_NET_ADMIN and a netlink dependency; deferred so the decision core stays std-only and host-independent."

[[unmapped]]
area     = "VXLAN device setup (the flannel.<vni> link: create, set VTEP MAC, MTU, bring up)"
priority = "phase-1b"
note     = "ADR-008: VxlanConfig models VNI/port/overhead; bringing the actual kernel VXLAN device up is netlink + CAP_NET_ADMIN. Deferred with the netlink datapath."

[[unmapped]]
area     = "WireGuard tunnel + peer setup (key management, wg device, allowed-IPs)"
priority = "phase-1b"
note     = "ADR-008: WireguardConfig + NodeBackendData::Wireguard model the config and per-peer attrs; establishing the wg interface and programming peers is privileged I/O. Deferred."

[[unmapped]]
area     = "host-gw datapath route install"
priority = "phase-1b"
note     = "ADR-008: host-gw RouteEntry{via: Gateway} is computed in routes.rs; installing those direct routes is the same netlink datapath layer as VXLAN. Deferred."

[[unmapped]]
area     = "durable subnet-lease store backend (etcd v3 / Kubernetes node annotations) + lease TTL renewal"
priority = "phase-1b"
note     = "ADR-008: SubnetManager holds the lease decision logic over an in-memory table; persisting leases to etcd or the K8s API, and renewing them on a TTL, is the storage/coordination layer. Deferred — the in-memory manager is the source-of-truth the store would back."

[[unmapped]]
area     = "flannel daemon watch loop (subscribe to lease events, react to peer join/leave, resync)"
priority = "phase-1b"
note     = "ADR-008: the long-running daemon that watches the lease store and re-derives the RoutePlan on every change wraps this decision core. compute_route_plan is the per-event function it would call. Deferred with the lease store."

[[unmapped]]
area     = "CNI plugin wire protocol (read stdin netconf JSON, write stdout result JSON, env CNI_COMMAND/CNI_ARGS) + veth plumbing"
priority = "phase-1b"
note     = "ADR-008: cni.rs models the ADD/DEL decision and typed result; serialising it to the CNI stdin/stdout JSON protocol and plumbing the veth pair into the pod netns is the plugin executable + netlink I/O. Deferred."

[[unmapped]]
area     = "delegate plugin chaining (invoking bridge/portmap/firewall as child processes)"
priority = "phase-1b"
note     = "ADR-008: the flannel CNI delegates the bridge/IPAM/portmap steps to chained plugins. Phase 1 computes the IPAM result directly; the exec chain is Phase 1b."

[[unmapped]]
area     = "multi-network CNI (FlannelNetwork CRD watcher + multiple cluster CIDRs)"
priority = "phase-1b"
note     = "ADR-008: K8s-CRD-driven multi-network wiring. Out of the home-cluster MVP (1–N nodes, single pod network)."

[[unmapped]]
area     = "udp / ipsec / ipvlan / macvlan backends"
priority = "permanent"
note     = "ADR-008 §Alternatives: Phase 1 is VXLAN-first with host-gw + WireGuard config modelled. The legacy udp datapath, IPSec, and ipvlan/macvlan L2 backends are out of scope for the cave-home audience and not carried."

[[unmapped]]
area     = "Windows VXLAN datapath"
priority = "permanent"
note     = "Charter §6 / ADR-003 mandate a Linux-only datapath; the Windows VXLAN path is permanently out of scope."

[[unmapped]]
area     = "pre-spec / legacy CNI result schema versions (< v1.0.0) compatibility mode"
priority = "permanent"
note     = "Charter §7 always-latest + §8 no-backcompat: this crate models the current CNI v1.0.0 result schema only; no historical-version compatibility shims. No backward compat is carried."

# ---------------------------------------------------------------------------
# spec_test — tests designed from spec / RFC reference values (not ported).
# ---------------------------------------------------------------------------

[[spec_test]]
designed_for = "CIDR mask/contains/overlap + subnet split (v4+v6) + nth-address boundaries (RFC 4632/4291)"
ours         = "src/cidr.rs::tests"

[[spec_test]]
designed_for = "v6 address-count saturation (a /0 v6 block exceeds u128) — no overflow"
ours         = "src/cidr.rs::tests::address_count_v6_saturates"

[[spec_test]]
designed_for = "per-node /24 allocation lowest-first + idempotent + release-reuse + exhaustion detection/recovery"
ours         = "src/subnet.rs::tests"

[[spec_test]]
designed_for = "static reservation pins a subnet and is skipped by free allocation; rejects out-of-cluster / wrong-prefix / taken subnets"
ours         = "src/subnet.rs::tests::{reserve_pins_a_specific_subnet,reserve_rejects_subnet_outside_cluster,reserve_rejects_wrong_prefix_length,reserve_rejects_subnet_held_by_other}"

[[spec_test]]
designed_for = "pod IPAM reserves .0+.1, allocates/frees host addrs, detects full + recovers; top-of-block usable; rejects reserved/out-of-range/duplicate; v6 subnet"
ours         = "src/ipam.rs::tests"

[[spec_test]]
designed_for = "flannel backend defaults (VNI 1, port 8472) + VXLAN/WireGuard overlay-MTU overhead + MAC parse/format + per-node-data/backend-type match"
ours         = "src/backend.rs::tests"

[[spec_test]]
designed_for = "route/FDB computation: VXLAN device+FDB per peer, host-gw gateway route, wireguard device route, DirectRouting same-underlay shortcut, never-route-own-subnet, mismatched-backend skip, deterministic ordering"
ours         = "src/routes.rs::tests"

[[spec_test]]
designed_for = "CNI ADD result (ip/prefix + gateway + default route + dns); specific-address assign; idempotent DEL; add/del/re-add reuse; subnet-full propagation (CNI v1.0.0 result schema)"
ours         = "src/cni.rs::tests"
