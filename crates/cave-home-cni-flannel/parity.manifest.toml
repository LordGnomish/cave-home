[[mapped]]
upstream = "pkg/subnet/local_manager.go::randomSubnet+populateLeaseChannel"
ours     = "subnet::manager::LocalManager::choose_subnet+enumerate_candidates"

[[mapped]]
upstream = "pkg/backend/common.go::Backend interface"
ours     = "backend::trait_def::Backend"

[[mapped]]
upstream = "pkg/backend/common.go::Network interface"
ours     = "backend::trait_def::BackendNetwork"
notes    = "Split out as a separate trait so `Backend` stays object-safe."

[[mapped]]
upstream = "pkg/backend/vxlan/vxlan.go::VXLANBackend+RegisterNetwork"
ours     = "backend::vxlan::VxlanBackend+VxlanNetwork::register"

[[mapped]]
upstream = "pkg/backend/vxlan/vxlan.go::VXLANBackendConfig"
ours     = "config::VxlanBackendConfig"

[[mapped]]
upstream = "pkg/backend/vxlan/device.go::vxlanDevice+ensureLink+Configure"
ours     = "backend::vxlan::device::VxlanDevice::ensure"
notes    = "Linux-gated. Uses rtnetlink crate; FDB writes deferred (see [[unmapped]] vxlan-fdb-netlink)."

[[mapped]]
upstream = "pkg/backend/vxlan/device.go::addARP+delARP"
ours     = "backend::vxlan::device::VxlanDevice::add_arp+del_arp"

[[mapped]]
upstream = "pkg/backend/vxlan/network.go::handleSubnetEvents"
ours     = "backend::vxlan::network::VxlanNetwork::handle_lease_event"
notes    = "Skips self-events; dedups Added on installed-set; mirrors upstream Add-then-overwrite semantics."

[[mapped]]
upstream = "pkg/backend/vxlan/vxlan.go::vxlanLeaseAttrs (BackendData)"
ours     = "backend::vxlan::config::VtepBackendData"

[[mapped]]
upstream = "cni-plugin/flannel.go::NetConf"
ours     = "cni::types::NetConf"

[[mapped]]
upstream = "cni-plugin/flannel.go::loadFlannelSubnetEnv"
ours     = "cni::subnet_env::parse_subnet_env"

[[mapped]]
upstream = "cni-plugin/flannel.go::cmdAdd+cmdDel+cmdCheck"
ours     = "cni::handler::dispatch (per CniCommand variant)"

[[mapped]]
upstream = "cni-plugin/main.go (CNI ENV→stdin→stdout protocol)"
ours     = "src/bin/cave-home-cni-flannel.rs::main"

# ---------------------------------------------------------------------------
# Unmapped — explicit Phase 1b backlog or permanent out-of-scope items.
# ---------------------------------------------------------------------------

[[unmapped]]
upstream = "pkg/backend/hostgw/"
priority = "phase-1b"
reason   = "Route-based no-encap backend. Useful when underlay is L2-flat. Deferred per task brief."

[[unmapped]]
upstream = "pkg/backend/wireguard/"
priority = "phase-1b"
reason   = "Encrypted overlay. Deferred per task brief; WireGuard userspace keypair handling is Phase 1b."

[[unmapped]]
upstream = "pkg/backend/ipsec/"
priority = "phase-1b"
reason   = "Strongswan-driven encryption. Deferred per task brief."

[[unmapped]]
upstream = "pkg/backend/udp/"
priority = "phase-1b"
reason   = "Legacy userspace tun-based fallback. Phase-1 is VXLAN-only."

[[unmapped]]
upstream = "pkg/backend/extension/"
priority = "phase-1b"
reason   = "Lets operators script their own datapath. Deferred."

[[unmapped]]
upstream = "pkg/backend/ipvlan/ + pkg/backend/macvlan/"
priority = "permanent"
reason   = "Out of MVP per task brief. ipvlan/macvlan are L2 alternatives we don't carry."

[[unmapped]]
upstream = "Windows VXLAN (pkg/backend/vxlan/vxlan_windows.go)"
priority = "permanent"
reason   = "Charter §6 mandates Linux-only datapath."

[[unmapped]]
upstream = "IPv6 single-stack code paths (pkg/subnet/*v6*, EnableIPv6 branches)"
priority = "phase-1b"
reason   = "Surface accepted (NetworkConfig.enable_ipv6, FLANNEL_IPV6_*) but allocation/install paths are IPv4-only."

[[unmapped]]
upstream = "Multi-network CNI (kube/multi-network reconciler + FlannelNetwork CRD)"
priority = "phase-1b"
reason   = "K8s CRD-watcher-driven multi-cluster wiring. Out of MVP."

[[unmapped]]
upstream = "cni-plugin delegate-plugin chaining (invoking bridge/portmap/firewall as child processes)"
priority = "phase-1b"
reason   = "Phase 1 emits the would-be-delegate result via subnet.env synthesis. Real exec chain is Phase 1b — see cni::handler::CniError::DelegateNotImplemented."

[[unmapped]]
upstream = "Kubernetes API integration (pkg/subnet/kube/kube.go)"
priority = "phase-1b"
reason   = "Lease state in K8s nodeAnnotations; Phase 1 keeps to etcd + memory."

[[unmapped]]
upstream = "vxlan FDB netlink writes (device.go::addFDB AF_BRIDGE NEIGH messages)"
priority = "phase-1b"
reason   = "rtnetlink 0.14 lacks AF_BRIDGE neigh add. ARP is wired; FDB deferred until rtnetlink upstream support lands or we drop to a custom NLM message."

[[unmapped]]
upstream = "live etcd integration test"
priority = "phase-1b"
reason   = "Trait conformance is enforced via MemRegistry; live etcd test runs only when CAVE_ETCD_ENDPOINT is set (etcd_registry_test::live_etcd_smoke_test_when_endpoint_set)."

[[unmapped]]
upstream = "vxlan device CAP_NET_ADMIN integration tests"
priority = "ported but requires linux+CAP_NET_ADMIN"
reason   = "tests/vxlan_device_test.rs is Linux-gated; runs only when the kernel + capability combo is present. NOT #[ignore]'d."

