# cave-home-cni-flannel — parity manifest vs. flannel-io/flannel.
#
# Honest measured state: this is the Phase 1 MVP. fill_ratio reflects only
# the modules we actually ported (subnet manager + VXLAN device + CNI plugin
# binary), not host-gw / WireGuard / IPSec / multi-network etc. — those are
# Phase 1b and recorded as `[[unmapped]]` with `priority = "phase-1b"`.

[crate]
name             = "cave-home-cni-flannel"
upstream_repo    = "flannel-io/flannel"
upstream_release = "v0.28.4"
upstream_sha     = "3adfe3e04407869b9f84be0a68a6cebb73df9c6e"
ported_at        = "2026-05-15"
linux_min_kernel = "7.1"
license          = "Apache-2.0"
port_method      = "line-by-line"

[ratios]
# fill_ratio = (ported LOC) / (upstream LOC reachable from VXLAN+leaser+CNI).
# upstream Phase-1-relevant scope: pkg/subnet (~1700 LOC) + pkg/backend/vxlan
# (~900 LOC) + cni-plugin/flannel.go (~600 LOC) ≈ 3200 LOC. Our src/ is
# ~1750 LOC line-mapped. Honest ratio = 1750/3200 ≈ 0.55. Subtracting
# delegate-chain + IPv6 + watch-resync code we explicitly defer brings the
# realised parity down to ~0.34 — see [[unmapped]] for the gap detail.
fill_ratio       = 0.34
test_port_ratio  = 0.40

# ---------------------------------------------------------------------------
# Mapped — upstream symbol → our Rust symbol (one entry per ported function/
# struct family).
# ---------------------------------------------------------------------------

[[mapped]]
upstream = "pkg/subnet/config.go::Config"
ours     = "config::NetworkConfig"
notes    = "JSON-on-the-wire match (Network/SubnetLen/EnableIPv4/Backend)."

[[mapped]]
upstream = "pkg/subnet/subnet.go::Lease"
ours     = "subnet::lease::Lease"

[[mapped]]
upstream = "pkg/subnet/subnet.go::LeaseAttrs"
