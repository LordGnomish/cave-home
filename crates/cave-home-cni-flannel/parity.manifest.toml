[[mapped]]
upstream = "pkg/subnet/types.go::Reservation"
ours     = "subnet::lease::Reservation"

[[mapped]]
upstream = "pkg/subnet/etcdv2/registry.go (Registry interface)"
ours     = "subnet::registry::Registry"
notes    = "Trait surface preserved; etcd v2 client is replaced with v3 (etcd-client crate) since v2 API is gone in modern etcd."

[[mapped]]
upstream = "pkg/subnet/local_manager.go::LocalManager"
ours     = "subnet::manager::LocalManager"

[[mapped]]
upstream = "pkg/subnet/local_manager.go::AcquireLease"
ours     = "subnet::manager::SubnetManager::acquire_lease"
notes    = "Idempotent on PublicIP; honours reservations; falls through to random-pick."

[[mapped]]
upstream = "pkg/subnet/local_manager.go::RenewLease"
ours     = "subnet::manager::SubnetManager::renew_lease"

[[mapped]]
upstream = "pkg/subnet/local_manager.go::RevokeLease"
