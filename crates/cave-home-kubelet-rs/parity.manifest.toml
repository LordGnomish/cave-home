ours     = "src/restart.rs::should_restart"

[[mapped]]
spec     = "CrashLoopBackOff exponential backoff curve (10s base, doubling, 300s cap) + in-backoff window check"
ours     = "src/restart.rs::{backoff_delay, in_crash_loop_backoff, next_restart_at_ms}"

[[mapped]]
spec     = "Probe threshold state machine: successThreshold/failureThreshold consecutive-run counting -> result transition"
ours     = "src/probe.rs::{ProbeWorker, Thresholds, ProbeResult}"

[[mapped]]
spec     = "Liveness failure triggers restart; startup probe gates (suppresses) liveness until it succeeds"
ours     = "src/probe.rs::{liveness_triggers_restart, liveness_active}"

[[mapped]]
spec     = "Pod Ready condition from container readiness + readinessGates"
ours     = "src/probe.rs::{pod_ready, ReadinessGate}"

[[mapped]]
spec     = "Desired-vs-observed pod-status sync -> action set (start/kill container) — the pure half of computePodActions"
ours     = "src/sync.rs::{compute_actions, SyncAction, is_converged}"

[[mapped]]
spec     = "QoS class derivation (Guaranteed/Burstable/BestEffort from requests/limits)"
ours     = "src/eviction.rs::{qos_class, QosClass}"

[[mapped]]
spec     = "Node-pressure eviction ranking: QoS order then usage-over-request, under memory/disk pressure"
ours     = "src/eviction.rs::{rank_for_eviction, EvictionCandidate, PressuredResource}"

[[mapped]]
spec     = "Node resource accounting (Allocatable - requested) + pod admission fit check"
ours     = "src/admission.rs::{NodeResources, admit_pod, pod_fits, AdmissionResult, InsufficientResource}"

[[mapped]]
spec     = "Resource model (CPU milli-cores + memory bytes; container requests/limits; request summation)"
