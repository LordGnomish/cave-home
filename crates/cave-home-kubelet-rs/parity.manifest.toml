# cave-home-kubelet-rs — line-by-line port manifest.
#
# Honest scoping: pkg/kubelet is enormous (~65 kLOC across 30+ sub-packages).
# Phase 1 only ports the syncPod-driving slice (PodWorker + Volume +
# PLEG + Status + CRI client trait + supporting API types). Everything
# else is enumerated under [[unmapped]] for Phase 1b or beyond.

[crate]
name             = "cave-home-kubelet-rs"
upstream_repo    = "kubernetes/kubernetes"
upstream_release = "v1.36.1"
upstream_sha     = "756939600b9a7180fc2df6550a4585b638875e67"
upstream_subpath = "pkg/kubelet"
ported_at        = "2026-05-15"
linux_min_kernel = "7.1"

[ratios]
# src LOC is ~2.5 kLOC against an upstream pkg/kubelet of ~65 kLOC =>
# fill_ratio ≈ 0.039. This is honest: kubelet is the largest component in
# the Kubernetes monorepo and Phase 1 is deliberately the syncPod core only.
fill_ratio      = 0.04
test_port_ratio = 0.02

