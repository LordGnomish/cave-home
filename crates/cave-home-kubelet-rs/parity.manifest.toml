# ---- spec_test (designed from the documented kubelet contract) --------------
# These are NOT ported from upstream _test.go (port_method is spec/contract-
# based). Each `designed_for` names the behaviour under test.

[[spec_test]]
designed_for = "Pod-phase truth table per restart policy: empty->Succeeded; all-waiting->Pending; any-running->Running; Never+any-failed->Failed; Never+all-succeeded->Succeeded; OnFailure+all-succeeded->Succeeded; OnFailure/Always restartable terminations stay Running; mixed terminal+waiting->Running; unobserved containers stay Pending"
ours         = "src/phase.rs::tests (16 cases)"

[[spec_test]]
designed_for = "Restart decision per policy + CrashLoopBackOff curve (0/base/doubling/cap, no overflow) + in-backoff window + next-restart-at saturation"
ours         = "src/restart.rs::tests (12 cases)"

[[spec_test]]
designed_for = "Probe threshold transitions: default 1/3; consecutive-failure flip; opposite-outcome resets streak; successThreshold>1; startup gates liveness; liveness-failure triggers restart; pod Ready from container readiness + gates; gate cannot override unready container"
ours         = "src/probe.rs::tests (15 cases)"

[[spec_test]]
designed_for = "PLEG-style desired-vs-observed action diff: fresh-start-all; running/waiting no-op; terminated restart-or-not per policy; ghost-running killed; terminated ghost not killed; deterministic combined start+kill"
ours         = "src/sync.rs::tests (10 cases)"

[[spec_test]]
designed_for = "QoS ranking under pressure: BestEffort<Burstable<Guaranteed eviction order; within-class most-over-request first; at/below-request sorts last; UID tie-break; memory and disk share the comparator"
ours         = "src/eviction.rs::tests (13 cases) — includes qos_class derivation cases"

[[spec_test]]
designed_for = "Node admission fit: empty/exact/zero-request fits; CPU & memory overcommit rejection with shortfall; CPU-before-memory determinism; admission consumes capacity; multi-container sums requests; available never negative"
ours         = "src/admission.rs::tests (10 cases)"

[[spec_test]]
designed_for = "Resource model: componentwise + saturating add, fits_within both axes, default-zero requests, request summation"
ours         = "src/resources.rs::tests (5 cases)"

# ---- upstream_test (syncPod execution slice — behavioural, not byte-ported) -

[[spec_test]]
designed_for = "PodWorker syncPod: create sandbox + start containers; idempotent re-sync; multi-container; kill removed container; sandbox-loss recreation; terminating stops all; terminated removes all; restart-policy create/no-create"
ours         = "tests/podworker_test.rs + tests/kubelet_sync_pod_test.rs"

[[spec_test]]
designed_for = "PLEG relist: started/died/removed events, no-change emits nothing, multi-pod independence, sandbox appear/disappear sync, mock-clock advance"
ours         = "tests/pleg_test.rs"

[[spec_test]]
designed_for = "Volume reconciler + emptyDir/hostPath plugins (CanSupport, SetUp/TearDown, DirectoryOrCreate/FileOrCreate, reject missing/non-dir) + DSW/ASW round-trips"
ours         = "tests/{volume_emptydir_test.rs, volume_hostpath_test.rs, volume_reconciler_test.rs}"

[[spec_test]]
designed_for = "Status manager: write-through, dedup, change-writes-again, transient-failure retry, always-failing keeps pending"
ours         = "tests/status_manager_test.rs"

[[spec_test]]
designed_for = "CRI mock + API type model exercised end-to-end"
ours         = "tests/{cri_test.rs, api_test.rs}"

# ---- no-backcompat (Charter §8) ---------------------------------------------
# Recorded explicitly so the stance is auditable: this crate ships against the
# current kubelet pod-lifecycle behaviour only. No dockershim/legacy-runtime,
# no Windows, no cgroup v1, and no pre-Linux-5.0 code paths are carried; the
# relevant items are listed as `permanent` [[unmapped]] above.
