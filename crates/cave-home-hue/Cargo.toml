[package]
name              = "cave-home-hue"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace   = true
description = "cave-home-hue — Philips Hue Bridge client; upstreams: home-assistant/core (hue integration, Apache-2.0) + home-assistant-libs/aiohue (Apache-2.0) + Philips Hue API v1/v2 developer-portal docs; port method: line-by-line (ADR-010)"

[package.metadata.cave-home]
upstream    = "home-assistant/core (hue) + home-assistant-libs/aiohue + Philips Hue API v1/v2"
port-method = "line-by-line"
adr         = "ADR-010"

# Reference upstreams — no commit is pinned. Prior pinned SHAs were unverified
# (one hash had been reused across unrelated upstreams) and were removed.
[package.metadata.upstream.home-assistant]
repo    = "home-assistant/core"
release = "2026.5.2"
subpath = "homeassistant/components/hue"

[package.metadata.upstream.aiohue]
repo    = "home-assistant-libs/aiohue"
release = "4.8.1"
subpath = "aiohue"

[features]
default = ["runtime"]
# `runtime` pulls in the real async HTTP(S) + SSE transport (reqwest/rustls).
# Disable it (`--no-default-features`) for a pure, dependency-light core that is
# tested entirely against in-process stubs.
runtime = ["dep:reqwest"]

[dependencies]
async-trait = "0.1"
futures     = "0.3"
parking_lot = "0.12"
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
thiserror   = "2"
tokio       = { version = "1", features = ["rt-multi-thread", "sync", "macros", "time", "io-util"] }
tracing     = "0.1"

# Real CLIP-v2 transport (HTTPS REST + Server-Sent Events). The Hue bridge
# serves a self-signed cert on the LAN, so the default client accepts it; a
# pinned-CA path is also provided. rustls keeps the build pure-Rust + offline.
reqwest = { version = "0.12", default-features = false, features = [
    "rustls-tls",
    "stream",
    "json",
    "http2",
], optional = true }

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros", "time", "io-util", "test-util", "net"] }

[lints]
workspace = true
