# cave-home-hue — line-by-line port manifest (Phase 1 MVP per ADR-010).
#
# Two Apache-2.0 upstreams are line-by-line-ported here:
#
#   - `home-assistant/core` v2026.5.2
#     subpath `homeassistant/components/hue/` — the HA "hue" integration
#     glue (bridge lifecycle, errors, migration).
#
#   - `home-assistant-libs/aiohue` v4.8.1
#     — the underlying Hue API client (v1 REST + v2 CLIP + SSE).
#
# Upstreams are pinned by release tag only — the previously recorded commit
# SHAs were unverified (one hash had been reused across unrelated upstreams)
# and have been removed.
#
# Honest scoping: upstream HA hue + aiohue together total ~12 kLOC of
# production Python (excluding tests + JSON strings). Phase 1 MVP ports
# the headline resource surface (lights, groups, scenes, sensors, motion,
# buttons, devices, rooms/zones, grouped_light, v2 events) and the
# bridge initialisation flow. Entertainment (DTLS streaming), HomeKit /
# Matter bridge mirroring, full ConfigFlow re-auth, advanced v1 rule
# engine and the long tail of v2 feature variants are tracked as
# `[[unmapped]]` for Phase 1b / 2.

[crate]
name             = "cave-home-hue"
port_method      = "line-by-line"
ported_at        = "2026-05-17"
linux_min_kernel = "7.1"
adr              = "ADR-010"

[[upstream]]
repo    = "home-assistant/core"
release = "2026.5.2"
subpath = "homeassistant/components/hue"
license = "Apache-2.0"

[[upstream]]
repo    = "home-assistant-libs/aiohue"
release = "4.8.1"
subpath = "aiohue"
license = "Apache-2.0"

[ratios]
# Production src LOC: ~2.7 kLOC (everything outside `#[cfg(test)]`).
# Combined upstream production LOC: ~5.4 kLOC (aiohue main + HA hue
# integration glue excluding test_*.py and string assets). fill_ratio is
# the headline production-port ratio.
fill_ratio              = 0.53
fill_ratio_basis        = "phase-1 MVP: v1 lights/groups/scenes/sensors/config + v2 models (lights/scenes/devices/motion/buttons/rooms/zones/grouped_light) + EventStream parser + bridge lifecycle + v2 controllers (lights, scenes, grouped_light, motion, button)"
test_port_ratio         = 0.30

