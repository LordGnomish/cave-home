# ---- unmapped (NOT in this crate; tagged for follow-up) ---------------------

[[unmapped]]
area     = "Hue Entertainment / DTLS streaming"
priority = "phase-2"
note     = "v2 entertainment_configuration + the realtime DTLS stream is a separate sub-protocol; ADR-010 §Open questions §1."

[[unmapped]]
area     = "v2 controllers: devices, rooms/zones, config; central EventStream dispatch router"
priority = "phase-1b"
note     = "grouped_light + motion + button controllers now landed (room/zone-level grouped on/off/brightness, motion set_enabled, and apply_event ingest of live SSE state on all three). Remaining: Device/Room/Zone/Config controllers and the central EventStream->controller dispatch that routes each HueEvent to the owning controller's apply_event/remove."

[[unmapped]]
area     = "v1 rule engine + schedules + resourcelinks"
priority = "phase-2"
note     = "Niche legacy v1 API surfaces (sensors-on-rules, schedules-on-bridge). v2 supersedes via behavior_instance."

[[unmapped]]
area     = "Behavior scripts / smart scenes (v2 behavior_instance, smart_scene)"
priority = "phase-1b"
note     = "Models will land in Phase 1b alongside the events controller."

[[unmapped]]
area     = "HomeKit / Matter resources (homekit, matter, matter_fabric)"
priority = "phase-2"
note     = "Bridge can expose itself as a HomeKit / Matter accessory; cave-home does this through its own Matter crate, so this v2-side surface is informational only."

[[unmapped]]
area     = "ConfigFlow re-auth UI"
priority = "phase-1b"
note     = "The bridge.rs surfaces LinkButtonNotPressed/Unauthorized as Ok(false); wiring the Portal re-pair flow is Phase 1b."

[[unmapped]]
area     = "Migration of v1 -> v2 entries (HA's migration.py)"
priority = "phase-1b"
note     = "Single-direction migration helper; runtime priority is low because cave-home defaults new entries to v2."

[[unmapped]]
area     = "Diagnostics dump (HA's diagnostics.py)"
priority = "phase-1b"
note     = "Snapshot of bridge state for support bundles; trivial port once Portal is wired."

[[unmapped]]
area     = "32-bit ARM / pre-Linux 7.1 kernels"
priority = "permanent"
note     = "ADR-003 — Linux 7.1+ only."

[[unmapped]]
area     = "Round-bridge BLE-pairing flow"
priority = "phase-1b"
note     = "ADR-010 mandates Hue Bridge v2 (square) + BLE-pairing first; legacy round bridge nice-to-have."

