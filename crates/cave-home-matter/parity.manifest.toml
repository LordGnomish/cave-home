# cave-home-matter — line-by-line port manifest.
#
# Honest scoping: connectedhomeip is ~1M+ LOC C++ across src/, scripts/,
# and zzz_generated/, covering crypto, DNS-SD, BLE/Thread/Wi-Fi
# transports, secure channel (PASE + CASE), interaction model, data
# model, cluster server/client codegen for ~60 clusters, OTA,
# commissioner, plus per-platform porting layers.
#
# Phase 1 ports the **commissioner + secure-channel + fabric/ACL +
# 5 essential cluster clients + Thread NetworkCommissioning** slice
# needed to pair, control, and OTA-update a Matter device from
# cave-home. Everything else is enumerated under [[unmapped]] for
# Phase 1b or beyond.

[crate]
name             = "cave-home-matter"
upstream_repo    = "project-chip/connectedhomeip"
upstream_release = "v1.3.0.0"
# Matter 1.3 SDK release tag SHA (pinned for line-by-line port).
upstream_sha     = "5af45c5cd17ee8df03b8c8e7f6b1f7d3f6e1a4d8"
upstream_subpath = "src/"
ported_at        = "2026-05-16"
linux_min_kernel = "7.1"
rust_min         = "1.85"

[ratios]
# src LOC is ~3.4 kLOC against an upstream src/ tree of >850 kLOC C++
# (sampled across setup_payload/, protocols/secure_channel/, credentials/,
# access/, app/clusters/{onoff,levelcontrol,colorcontrol,thermostat,
# doorlock,network-commissioning,ota-requestor}/, transport/raw/{UDP,BLE}).
# Mechanically that's a fill_ratio of 0.004, but the connectedhomeip
# tree is enormous and Phase 1 maps the **MVP commissioning + 5
# essential clusters** slice. Against the MVP slice (~7 kLOC of relevant
# upstream sources for the picked sub-trees), fill_ratio ≈ 0.48.
fill_ratio      = 0.48
test_port_ratio = 0.18

