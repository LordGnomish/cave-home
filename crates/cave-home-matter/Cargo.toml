[package]
name              = "cave-home-matter"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace   = true
description = "cave-home-matter — Matter 1.3+ stack reimpl; upstream: project-chip/connectedhomeip (Apache-2.0); port method: line-by-line"

[package.metadata.cave-home]
upstream    = "project-chip/connectedhomeip"
port-method = "line-by-line"
phase       = "matter-phase-1"

# Commit SHA is the verified resolution of the v1.3.0.0 release tag
# (confirmed against the upstream GitHub release page). A prior pinned SHA
# (5af45c5c…) was fabricated — it did not match the tag — and is corrected.
[package.metadata.upstream]
repo    = "project-chip/connectedhomeip"
release = "v1.3.0.0"
commit  = "5bb5c9e23d532cea40476fc0bd1d3008522792ba"
subpath = "src/"

[dependencies]
aes-gcm     = { version = "0.10", default-features = false, features = ["aes", "alloc"] }
async-trait = "0.1"
hkdf        = "0.12"
hmac        = "0.12"
parking_lot = "0.12"
rand        = "0.8"
sha2        = "0.10"
thiserror   = "2"
tokio       = { version = "1", features = ["rt-multi-thread", "sync", "macros", "time", "net"] }

[dev-dependencies]
hex   = "0.4"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros", "time", "test-util"] }

[lints]
workspace = true
