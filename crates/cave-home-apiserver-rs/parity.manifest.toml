# cave-home-apiserver-rs — line-by-line port manifest (Phase 2 MVP).
#
# Honest scoping: cmd/kube-apiserver + staging/src/k8s.io/apiserver
# together are ~80 kLOC of production Go (the generic server + the
# storage/registry abstractions + the admission framework + RBAC +
# authentication chain + REST endpoints). Phase 2 ships the MVP slice
# only: in-memory storage backend (etcd-real lands via cave-home-kine-rs
# in Phase 3), Authenticator/Authorizer traits with ClientCert + SA
# token + RBAC impls, two admission plugins (NamespaceLifecycle +
# ServiceAccount), and an HTTP REST surface over core/v1 + apps/v1 +
# batch/v1 resource families. The fill_ratio is honest against the full
# upstream baseline, not a cherry-picked sub-package.

[crate]
name             = "cave-home-apiserver-rs"
upstream_repo    = "kubernetes/kubernetes"
upstream_release = "v1.36.1"
upstream_sha     = "756939600b9a7180fc2df6550a4585b638875e67"
upstream_subpath = "cmd/kube-apiserver + staging/src/k8s.io/apiserver"
ported_at        = "2026-05-16"
linux_min_kernel = "7.1"

[ratios]
# Production-only src LOC (~2.63 kLOC, measured by stripping each
# module at the first `#[cfg(test)]` boundary) against the upstream
# cmd/kube-apiserver + staging/apiserver production baseline
# (~80 kLOC of Go) = 0.033. Inline tests add ~0.83 kLOC, giving a
# test_port_ratio of ~0.010. fill_ratio sits at the low end of the
# 0.03-0.10 honest range because the apiserver upstream is the
# largest Phase-2 component and Phase 2 deliberately defers webhook
# admission, CRDs, aggregated API, and full OpenAPI v3.
fill_ratio      = 0.033
test_port_ratio = 0.010

