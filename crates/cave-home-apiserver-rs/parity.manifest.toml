# cave-home-apiserver-rs — parity manifest.
#
# This crate is the Kubernetes API-server *decision core* for the cave-home
# K3s-style orchestration layer (ADR-004). It is the brain that decides what a
# REST verb *means*: resource identity (GVK/GVR), the REST URL grammar,
# optimistic-concurrency on ObjectMeta, the create/get/list/update/patch/delete/
# watch semantics over an in-memory registry, label/field selectors, the
# RFC-7396/6902 patch algorithms, and the two-phase admission pipeline. The
# actual HTTP/2 transport, etcd/kine storage, TLS + authn + authz (RBAC), and
# the dynamic extension surfaces (webhooks, CRDs, aggregation) are deferred and
# enumerated below.
#
# HONEST PORT METHOD. This is a *behavioural reimplementation of the documented
# Kubernetes REST semantics* — the public API conventions, the label/field
# selector docs, RFC 7396 (JSON Merge Patch) + RFC 6902 (JSON Patch), and the
# documented admission-controller phase contract. It is NOT a verbatim
# line-by-line transcription of any pinned kubernetes/kubernetes revision; no
# such source was read for this implementation. ADR-004 frames the
# orchestration layer's long-term goal as a line-by-line k3s port, so the
# verbatim-parity remainder for this component is enumerated below as ADR-004
# phase-1b deferred work, NOT claimed as done.
#
# PROVENANCE CORRECTION: an earlier revision of this crate's Cargo.toml +
# manifest + module doc-comments falsely asserted a "line-by-line port" of
# kubernetes/kubernetes v1.36.1 pinned at SHA
# 756939600b9a7180fc2df6550a4585b638875e67, with per-symbol [[mapped]] claims of
# verbatim correspondence to specific upstream Go files (genericapiserver.go,
# rest.go, store.go, etc.). That provenance was inaccurate — the code was not a
# transcription of that source. The pinned SHA, the upstream_subpath claims, and
# the verbatim-mapping language have been removed and replaced with this honest
# spec-based provenance.
#
# Charter §6.3: this is INFRASTRUCTURE, hidden from end-users. It produces no
# user-facing strings and carries no grandma-friendly / i18n labels by design.
# Charter §8 no-backcompat + ADR-003 Linux-only baseline apply.

[crate]
name         = "cave-home-apiserver-rs"
upstream_repo = "kubernetes/kubernetes + k3s-io/k3s (kube-apiserver, behavioural reference target per ADR-004)"
port_method  = "behavioural reimplementation of the documented k8s REST/admission contract (spec-based; not verbatim line-by-line); full line-by-line k3s port deferred (ADR-004 phase-1b)"
spec_sources = [
    "Kubernetes API Conventions (community/contributors/devel/sig-architecture/api-conventions.md) — Resources, Resource Paths, Metadata, Concurrency Control and Consistency, Response Status Kind, verbs",
    "Kubernetes docs: Labels and Selectors (equality-based + set-based requirements: =, ==, !=, in, notin, exists, !exists)",
    "Kubernetes docs: Field Selectors (key=value / key!=value, comma = AND)",
    "RFC 7396 — JSON Merge Patch (application/merge-patch+json)",
    "RFC 6902 — JSON Patch (application/json-patch+json); RFC 6901 — JSON Pointer",
    "Kubernetes docs: Admission Controllers (mutating phase then validating phase; NamespaceLifecycle behaviour)",
    "Kubernetes docs: Garbage Collection / ownerReferences + finalizers + foreground deletion (deletionTimestamp set while finalizers present)",
    "Kubernetes docs: GroupVersionKind / GroupVersionResource + RESTMapper (kind<->resource, namespaced vs cluster-scoped)",
]
ported_at        = "2026-05-29"
linux_min_kernel = "7.1"  # ADR-003: Linux-only deployment baseline.

[ratios]
# Denominator = the entire kube-apiserver scope: the REST decision core PLUS the
# HTTP/2 server + routing, the etcd/kine storage backend, TLS + authentication
# (x509/token/OIDC) + authorization (RBAC/Node), admission webhooks, CRDs, API
# aggregation, and audit. Numerator = the decision core implemented & tested
# here: GVK/GVR + RESTMapper, the REST path grammar (parse + build), the
# ObjectMeta optimistic-concurrency model (resourceVersion conflict, generation
# bump on spec change, finalizer-blocked delete, ownerReferences), the
# create/get/list/update/patch/delete/watch verb semantics over an in-memory
# registry (with the correct AlreadyExists/NotFound/Conflict status codes and
# selector + limit/continue pagination), label/field selector parsing+matching,
# the RFC-7396/6902 patch algorithms, the metav1.Status error model, and the
# two-phase admission pipeline with built-in NamespaceLifecycle/DefaultFields/
# RequireName rules. Everything still in the gap is enumerated below with an
# ADR-004 phase disposition, so the honest ratio reflects the implemented share
# of what remains in scope. (The fill is reported against capability, not raw
# Go LOC: the decision core is disproportionately load-bearing relative to its
# size — it is the part that every other path is a transport/storage lowering of.)
fill_ratio          = 0.20
fill_ratio_basis    = "REST decision core (GVK/GVR+RESTMapper, path grammar, ObjectMeta optimistic concurrency + generation + finalizers + ownerRefs, CRUD+list+watch verb semantics with correct status codes + pagination, label/field selectors, RFC-7396/6902 patch, metav1.Status, mutating+validating admission pipeline) implemented & tested std-only; HTTP server, etcd/kine storage, TLS/authn/authz, webhooks, CRDs, aggregation, audit deferred"
test_port_ratio     = 0.0   # tests designed from the documented spec, not ported
adr_justified_ratio = 1.00  # every unfilled item below carries an ADR-004 phase disposition + note
honest_ratio        = 1.00  # 0.20 / (0.20 + (1-0.20)*(1-1.0)) = 1.00

# ---------------------------------------------------------------------------
# [[mapped]] — documented k8s REST/admission concept -> cave-home Rust path
# ---------------------------------------------------------------------------

[[mapped]]
spec = "GroupVersionKind / GroupVersionResource identity + apiVersion (group/version) parsing/building"
ours = "src/gvk.rs::{GroupVersionKind, GroupVersionResource}"

[[mapped]]
spec = "RESTMapper kind<->resource mapping + namespaced-vs-cluster-scoped lookup over the built-in core/v1 + apps/v1 + batch/v1 kinds"
ours = "src/gvk.rs::{kind_for, resource_for, is_namespaced, is_known}"

[[mapped]]
spec = "REST resource-path grammar: /api/{v}/... + /apis/{g}/{v}/... + optional namespaces/{ns}/ + {resource}[/{name}[/{subresource}]] — parse + build, with cluster-scoped/namespaced validation"
ours = "src/path.rs::{parse, ResourcePath, ResourcePath::to_path}"

[[mapped]]
spec = "ObjectMeta + the optimistic-concurrency model (resourceVersion), generation, deletionTimestamp, finalizers, ownerReferences"
ours = "src/meta.rs::{ObjectMeta, OwnerReference, read_meta, write_meta, spec_changed}"

[[mapped]]
spec = "CREATE verb — reject duplicate name as AlreadyExists (409); assign uid + resourceVersion + generation=1"
ours = "src/registry.rs::Registry::create"

[[mapped]]
spec = "GET verb — NotFound (404) for a missing object or unknown resource"
ours = "src/registry.rs::Registry::get"

[[mapped]]
spec = "UPDATE/replace verb — optimistic concurrency: stale resourceVersion -> Conflict (409); generation bumps only on .spec change"
ours = "src/registry.rs::Registry::update"

[[mapped]]
spec = "PATCH verb — apply merge / json-merge / json patch to the stored value tree then re-version + conditional generation bump"
ours = "src/registry.rs::{Registry::patch_merge, Registry::patch_json}"

[[mapped]]
spec = "DELETE verb — finalizer-aware: deletionTimestamp set + object retained while finalizers present; actual removal only once finalizers cleared"
ours = "src/registry.rs::Registry::delete"

[[mapped]]
spec = "LIST verb — label + field selector filtering, namespace scoping, deterministic ordering, limit/continue pagination"
ours = "src/registry.rs::{Registry::list, ListOptions, ListResult}"

[[mapped]]
spec = "WATCH verb — event stream (ADDED/MODIFIED/DELETED) replayable after a resourceVersion"
ours = "src/registry.rs::{Registry::watch_since, WatchEvent, WatchEventKind}"

[[mapped]]
spec = "Label selector parse + match: key=val, key!=val, key in (a,b), key notin (a,b), exists, !exists; comma = AND"
ours = "src/selector.rs::{LabelSelector, Requirement}"

[[mapped]]
spec = "Field selector parse + match over the object value tree (dotted paths, key=value / key!=value, comma = AND)"
ours = "src/selector.rs::FieldSelector"

[[mapped]]
spec = "JSON Merge Patch (RFC 7396) — recursive object merge, null deletes a key, non-object replaces"
ours = "src/patch.rs::apply_merge_patch"

[[mapped]]
spec = "JSON Patch (RFC 6902) add/remove/replace/test over RFC-6901 JSON pointers (with ~0/~1 unescaping)"
ours = "src/patch.rs::{apply_json_patch, PatchOp}"

[[mapped]]
spec = "metav1.Status error model — reason -> canonical HTTP code (NotFound/AlreadyExists/Conflict/Invalid/BadRequest/Forbidden/MethodNotAllowed/InternalError) + message; no panics"
ours = "src/status.rs::{Status, StatusReason}"

[[mapped]]
spec = "Admission as an ordered pipeline: all mutating plugins (may rewrite the object) then all validating plugins (accept/reject); first reject short-circuits"
ours = "src/admission.rs::{AdmissionChain, MutatingPlugin, ValidatingPlugin, AdmissionRequest, Operation}"

[[mapped]]
spec = "Built-in admission rules: NamespaceLifecycle (reject missing/terminating namespace), DefaultFields (default namespace on create), RequireName"
ours = "src/admission.rs::{NamespaceExists, DefaultFields, RequireName}"

[[mapped]]
spec = "JSON object model the REST/patch/selector logic operates on (std-only value tree; no serialization-framework dependency)"
ours = "src/json.rs::Value"

# ---------------------------------------------------------------------------
# [[unmapped]] — deferred / out-of-scope, each with an ADR-004 disposition
# ---------------------------------------------------------------------------

[[unmapped]]
area     = "Verbatim line-by-line k3s/kubernetes kube-apiserver source port"
priority = "phase-1b"
note     = "ADR-004 frames the orchestration layer as a long-term line-by-line k3s port. Phase 1 ships a behavioural reimplementation from public docs/RFCs; the verbatim-parity pass (matching upstream symbol-for-symbol) is deferred and must be done against the actual Apache-2.0 k3s/kubernetes source. This replaces an earlier FALSE claim of a completed line-by-line port at a pinned SHA."

[[unmapped]]
area     = "HTTP/2 server + request routing + content negotiation (the transport that dispatches parsed paths to the registry)"
priority = "phase-1b"
note     = "ADR-004: the decision core parses/builds paths and computes verb outcomes + status codes; wiring it behind an HTTP/2 server (TLS-terminated) with protobuf/JSON/YAML content negotiation is transport plumbing over the existing logic, not new decision logic."

[[unmapped]]
area     = "etcd / kine storage backend (durable, watch-capable, transactional)"
priority = "phase-1b"
note     = "ADR-004: Phase 1 ships an in-memory Registry with a global resourceVersion counter + replayable watch history; the durable etcd v3 (or kine/SQLite) backend with real revisions, leases, compaction and txn-based optimistic concurrency lands in a later phase and slots behind the same verb semantics."

[[unmapped]]
area     = "TLS termination + authentication (x509 client certs / bearer + service-account tokens / OIDC) + the authenticated-request chain"
priority = "phase-1b"
note     = "ADR-004: identity is a precondition the transport layer establishes; the decision core is identity-agnostic. The authn chain is deferred to the security phase of the orchestration layer."

[[unmapped]]
area     = "Authorization — RBAC (Role/ClusterRole/RoleBinding/ClusterRoleBinding/PolicyRule) + Node authorizer"
priority = "phase-1b"
note     = "ADR-004: the verb + resource + namespace attributes the authorizer needs are already modelled (path parse + Operation); the RBAC rule-matching authorizer and its caches are deferred to the security phase."

[[unmapped]]
area     = "Admission webhooks (dynamic Mutating/ValidatingWebhookConfiguration, out-of-process plugins)"
priority = "phase-1b"
note     = "ADR-004: the in-process two-phase pipeline (mutating then validating, ordered, short-circuiting) is implemented + tested; the dynamic webhook plugins that call external HTTPS endpoints are deferred — they are additional plugins on the same chain."

[[unmapped]]
area     = "CustomResourceDefinitions (dynamic kind registration + structural schema validation + conversion webhooks)"
priority = "phase-1b"
note     = "ADR-004: the RESTMapper ships a static built-in kind table; CRD-driven dynamic registration + OpenAPI structural validation is deferred. The registry already stores arbitrary value-tree objects, so CRDs are a registration/validation overlay, not a storage change."

[[unmapped]]
area     = "API aggregation layer (APIService delegation to extension apiservers)"
priority = "phase-1b"
note     = "ADR-004: routing a sub-path to a delegated extension apiserver is a transport concern layered above this decision core; deferred."

[[unmapped]]
area     = "Audit subsystem (request/response audit events + policy + backends)"
priority = "phase-1b"
note     = "ADR-004: observability/compliance surface; not decision-core logic. Deferred to the security phase."

[[unmapped]]
area     = "Strategic Merge Patch (the k8s list-merge-key strategy) + Server-Side Apply (field management / managedFields)"
priority = "phase-2"
note     = "ADR-004: Merge Patch (RFC 7396) and JSON Patch (RFC 6902) are implemented; strategic-merge-patch and SSA apply/conflict are a later patch-strategy refinement over the same value tree + ObjectMeta model."

[[unmapped]]
area     = "Cascading garbage collection of dependents via ownerReferences (the GC controller)"
priority = "phase-2"
note     = "ADR-004: ownerReferences + blockOwnerDeletion are modelled in ObjectMeta and the finalizer-aware delete is implemented; the controller that actually walks the owner graph and deletes orphaned dependents is a separate controller-manager component, not apiserver decision logic."

[[unmapped]]
area     = "Windows + pre-Linux-5.0 deployment paths"
priority = "permanent"
note     = "Charter §8 no-backcompat + ADR-003 Linux-only (kernel 5.0+): never ported."

# ---------------------------------------------------------------------------
# [[spec_test]] — tests designed from the documented spec / RFC behaviour
# ---------------------------------------------------------------------------

[[spec_test]]
designed_for = "GVK/GVR apiVersion forms + RESTMapper kind<->resource + namespaced/cluster-scoped lookup + unknown-resource"
ours         = "src/gvk.rs::tests (8 cases)"

[[spec_test]]
designed_for = "REST path parse/build round-trip (core/grouped, namespaced/cluster, collection/named, single-Namespace, subresource) + NotFound for unknown resource + BadRequest for cluster-scoped-with-namespace / bad prefix"
ours         = "src/path.rs::tests (10 cases)"

[[spec_test]]
designed_for = "ObjectMeta read/write round-trip + spec_changed detection + finalizer/deletionTimestamp/ownerReference parsing + safe defaults (no panic on Null)"
ours         = "src/meta.rs::tests (6 cases)"

[[spec_test]]
designed_for = "CRUD status codes: create AlreadyExists(409), get NotFound(404), unknown-resource NotFound, update stale-rv Conflict(409), invalid create"
ours         = "src/registry.rs::tests::{create_duplicate_is_already_exists, get_missing_is_not_found, unknown_resource_is_not_found, update_with_stale_rv_conflicts, create_rejects_missing_name}"

[[spec_test]]
designed_for = "Optimistic concurrency + generation: rv assignment, current-rv update bumps rv, generation bumps only on spec change"
ours         = "src/registry.rs::tests::{create_assigns_rv_uid_generation, update_with_current_rv_succeeds_and_bumps_rv, generation_bumps_only_on_spec_change}"

[[spec_test]]
designed_for = "Finalizer-aware delete: blocked while finalizers present (deletionTimestamp set, object retained), removed after finalizers cleared, removed immediately when none"
ours         = "src/registry.rs::tests::{delete_with_finalizers_sets_deletion_timestamp_and_keeps_object, delete_after_finalizers_cleared_removes_object, delete_without_finalizers_removes_immediately}"

[[spec_test]]
designed_for = "LIST selectors + pagination + namespace scoping; WATCH replay of ADDED/MODIFIED/DELETED after a resourceVersion"
ours         = "src/registry.rs::tests::{list_filters_by_label_selector, list_filters_by_field_selector_namespace, list_pagination_with_limit_and_continue, list_namespace_scoping, watch_replays_events_after_rv, watch_includes_modify_and_delete}"

[[spec_test]]
designed_for = "Label selector parsing + matching: equality/inequality, in/notin, exists/!exists, conjunction-AND, !=-when-absent, empty-matches-all; field selector dotted-path match + bare-key rejection"
ours         = "src/selector.rs::tests (12 cases)"

[[spec_test]]
designed_for = "RFC 7396 merge patch (add/overwrite, null-deletes, recursive object merge, non-object replace) + RFC 6902 json patch (replace-existing, replace-missing-invalid, add/remove, array append/index, test pass/fail, ~0/~1 pointer unescape, whole-document)"
ours         = "src/patch.rs::tests (11 cases)"

[[spec_test]]
designed_for = "metav1.Status reason->code mapping + helper constructors + Display"
ours         = "src/status.rs::tests (3 cases)"

[[spec_test]]
designed_for = "Admission pipeline ordering (mutating-before-validating, in append order) + reject short-circuit + mutation visible to validation; built-in rule behaviour (DefaultFields namespace default, NamespaceLifecycle missing/terminating reject, RequireName)"
ours         = "src/admission.rs::tests (9 cases)"

[[spec_test]]
designed_for = "std-only JSON value tree: dotted pointer resolution, canonical sorted-key rendering, integer vs float rendering, string escaping"
ours         = "src/json.rs::tests (4 cases)"
