[[unmapped]]
area     = "Verbatim line-by-line k3s/kubernetes kube-apiserver source port"
priority = "phase-1b"
note     = "ADR-004 frames the orchestration layer as a long-term line-by-line k3s port. Phase 1 ships a behavioural reimplementation from public docs/RFCs; the verbatim-parity pass (matching upstream symbol-for-symbol) is deferred and must be done against the actual Apache-2.0 k3s/kubernetes source. This replaces an earlier FALSE claim of a completed line-by-line port at a pinned SHA."

[[unmapped]]
area     = "HTTP/2 + protobuf/YAML content negotiation (the HTTP/1.1 server itself is now implemented)"
priority = "phase-1b"
note     = "ADR-004: the std-only HTTP/1.1 server + router + content-negotiation-by-content-type is implemented (src/server.rs, src/handler.rs, src/http.rs) and exercised by a real-TCP kubectl-style integration test. Still deferred: HTTP/2 (h2 framing), protobuf (application/vnd.kubernetes.protobuf) + YAML body codecs, and HTTP keep-alive (each connection currently serves one request then closes)."

[[unmapped]]
area     = "etcd / kine storage backend wiring (the kine KV seam exists; persisting the Registry through it does not yet)"
priority = "phase-1b"
note     = "ADR-004: the kine KV seam is now implemented + tested (src/storage.rs::{Backend, KineBackend} over cave_home_kine_rs::Store: conditional create, revisioned update, delete, prefix list, revision->resourceVersion). Still deferred: wiring Backend in *behind* the Registry so ApiServer writes are durable (object<->KV (de)serialization + watch off the kine watch stream + lease/compaction), and a remote kine over gRPC. The in-memory Registry remains the default."

[[unmapped]]
area     = "OIDC / service-account-JWT authenticators (TLS + mTLS termination + bearer-token + anonymous + x509 client-cert authn are now implemented)"
priority = "phase-1b"
note     = "ADR-004: the authentication chain (bearer-token token-file + anonymous, with 401 on invalid credentials) is implemented + tested (src/authn.rs) and wired into the handler. TLS + mutual-TLS termination is NOW implemented behind the off-by-default `tls` feature (src/tls.rs: rustls 0.23 pinned to the ring provider, server_config/server_config_mtls, TlsServer + serve_tls_stream reusing src/server.rs's generic Read+Write handler flow over a rustls StreamOwned). x509 client-cert authn is NOW implemented end-to-end: the std-only Subject parser (src/x509.rs, CN→user / O→groups) + RequestHeaderAuthenticator (src/authn.rs), with the terminator stripping client-supplied X-Remote-* and injecting the verified identity (anti-spoofing). Still deferred: HTTP/2 + keep-alive on the TLS path, service-account-token (JWT) authn, and OIDC — additional Authenticator impls on the same chain."

[[unmapped]]
area     = "Authorization — Node authorizer, aggregated ClusterRoles, and the SubjectAccessReview / webhook-authorizer surfaces"
priority = "phase-1b"
note     = "ADR-004: the additive RBAC rule-matching authorizer (Role/ClusterRole/RoleBinding/ClusterRoleBinding/PolicyRule over verb/apiGroup/resource/subresource/resourceName/non-resource-URL attributes, with the cluster-vs-namespaced binding scope) is now implemented + tested in src/rbac.rs. Still deferred to the security phase: the Node authorizer (graph-based node->object scoping), ClusterRole aggregation (aggregationRule label selectors), and the dynamic surfaces — the SubjectAccessReview/SelfSubjectAccessReview REST API and the out-of-process webhook authorizer. The authorizer rule-evaluation caches are an optimization layered over the same matching logic."

[[unmapped]]
