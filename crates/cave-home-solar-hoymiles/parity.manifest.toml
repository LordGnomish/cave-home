[[spec_test]]
designed_for = "CRC-8/NRSC-5 + CRC-16/Modbus published check vectors (123456789)"
ours         = "src/crc.rs::tests"

[[spec_test]]
designed_for = "Inverter serial parse + last-four-bytes radio address + opcode round-trip"
ours         = "src/frame.rs::tests"

[[spec_test]]
designed_for = "Fragment reassembly — in-order, out-of-order, missing, corrupt-CRC, duplicate, retransmit"
ours         = "src/reassembly.rs::tests"

[[spec_test]]
designed_for = "Real-time decode field values + fixed-point scaling + efficiency + per-family channel counts"
ours         = "src/telemetry.rs::tests"

[[spec_test]]
designed_for = "Truncated-payload + bad-CRC-16 rejection (never panics)"
ours         = "src/telemetry.rs::tests::{rejects_truncated_payload,rejects_bad_checksum}"

[[spec_test]]
designed_for = "Family channel counts + rated-watt inference + unknown-rating rejection"
ours         = "src/family.rs::tests"

[[spec_test]]
designed_for = "Alarm/operating-state mapping to grandma-friendly status + shaded-panel detection"
