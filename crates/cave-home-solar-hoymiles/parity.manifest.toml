# cave-home-solar-hoymiles — parity manifest scaffold.
#
# Charter v2 G4: every crate ships a parity.manifest.toml. This is the
# scaffold form — fill_ratio is bumped as the line-by-line port lands.
# cave-home-solar-hoymiles — Hoymiles microinverter support (HM/HMS/HMT series); upstream refs: lumapu/ahoy (AhoyDTU) + tbnobody/OpenDTU GPL-3.0, port method: clean-room (Hoymiles protocol spec + AhoyDTU public API docs; source not read)

[crate]
name             = "cave-home-solar-hoymiles"
upstream_repo    = "lumapu/ahoy (AhoyDTU) + tbnobody/OpenDTU (reference only, GPL-3.0)"
port_method      = "clean-room"
spec_sources     = [
    "Hoymiles HM/HMS/HMT wire protocol (reverse-engineered, publicly documented) + AhoyDTU public API documentation",
]
ported_at        = "2026-05-25"
linux_min_kernel = "7.1"

[ratios]
fill_ratio              = 0.00
fill_ratio_basis        = "scaffold + manifest only (real port lands in phase 1)"
fill_ratio_full_module  = 0.00
test_port_ratio         = 0.00

# Once the port begins, replace this scaffold with [[mapped]] / [[unmapped]] /
# [[test_port]] tables (see crates/cave-home-core/parity.manifest.toml for shape).

