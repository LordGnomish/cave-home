# cave-home-zigbee — clean-room reimplementation manifest.
#
# Per ADR-002 + Charter §6.1: the upstream `Koenkk/zigbee2mqtt` is GPL-3.0,
# so cave-home-zigbee is implemented strictly from the Zigbee 3.0 specs +
# `zigbee-herdsman` public API docs. The upstream source has not been read.
#
# Honest scoping: the full Zigbee 3.0 stack (NWK + APS + ZDO + ZCL + ZDP +
# Touchlink + OTA + Smart Energy Profile + Green Power + InstallCode + ECDH
# pairing) is comparable in size to ~150 kLOC of C; Phase 1 ships the slice
# needed to run a coordinator on Sonoff ZBDongle-E (EZSP), SMLIGHT SLZB-06
# (EZSP-over-network), and ConBee II (deCONZ), plus device pairing, ZCL
# foundation, groups, scenes, and an OTA queue. Everything else is
# enumerated in [[unmapped]] for Phase 1b or beyond.

[crate]
name             = "cave-home-zigbee"
upstream_repo    = "Koenkk/zigbee2mqtt"
upstream_license = "GPL-3.0-only"
port_method      = "clean-room"
spec_sources     = [
    "Zigbee 3.0 Specification (CSA, public PDF)",
    "Zigbee Cluster Library Revision 8 (CSA, public PDF)",
    "Zigbee Base Device Behavior 3.0.1 (CSA, public PDF)",
    "IEEE 802.15.4-2020 (PHY / MAC frame layer)",
    "Silicon Labs EZSP UG100 (public Silicon Labs documentation)",
    "deCONZ Serial Protocol (public dresden-elektronik documentation)",
    "zigbee-herdsman public API surface (npm README + .d.ts type signatures only)",
]
ported_at        = "2026-05-16"
linux_min_kernel = "7.1"

[ratios]
# Honest count: src LOC for Phase 1 MVP is ~6.9 kLOC. The Phase 1 MVP
# *scope* (EZSP coordinator init + deCONZ coordinator init + transport +
# ZCL foundation + APS + pairing + groups + scenes + OTA queue + the
# application-cluster layer that makes the coordinator actually usable:
# OnOff + Level Control + Color Control + IAS Zone + Occupancy Sensing) is
# roughly 12.5 kLOC equivalent of work, so the Phase 1 MVP fill_ratio is
# ~0.55. Against the *full* Z2M-equivalent surface (~150 kLOC C
# equivalent), the fill ratio is much smaller (~0.046) — Phase 1 is
# deliberately the coordinator + ZCL foundation + headline-cluster slice.
fill_ratio              = 0.55
fill_ratio_basis        = "phase-1 MVP scope (coordinator + transport + ZCL foundation + pairing/groups/scenes/OTA queue + OnOff/LevelControl/ColorControl/IasZone/OccupancySensing application clusters)"
fill_ratio_full_stack   = 0.046
test_port_ratio         = 0.0     # clean-room: tests are designed from spec, not ported

