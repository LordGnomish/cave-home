# ---- unmapped (NOT in this crate; tagged for follow-up) ---------------------

[[unmapped]]
area     = "Zigbee Green Power profile"
priority = "phase-1b"
note     = "Green Power proxy + sink — separate ZCL cluster, requires the GP basic stack on top of the core APS layer."

[[unmapped]]
area     = "Smart Energy Profile (SEP 1.x / 2.x)"
priority = "phase-2"
note     = "Tariff / Demand Response / Pricing clusters — niche for the headline persona; punt until §3.2 ADR-012 needs it."

[[unmapped]]
area     = "OTA image transport (download + verify + signal device)"
priority = "phase-1b"
note     = "Phase 1 ships only the OtaQueue + provider-trait interface; actual block transfer + signature verification is Phase 1b."

[[unmapped]]
area     = "Custom device converters (Z2M-style)"
priority = "phase-1b"
note     = "Z2M maps 4000+ devices via JS converters. cave-home will instead model devices as ZCL attribute paths; per-device quirks land per-device in Phase 1b."

[[unmapped]]
area     = "Centralised vs distributed trust-centre policy"
priority = "phase-1b"
note     = "Phase 1 supports centralised trust centre (coordinator-rooted). Distributed networks are Phase 1b."

[[unmapped]]
area     = "InterPAN / Touchlink commissioning over inter-PAN"
priority = "phase-1b"
note     = "Phase 1 implements traditional join + InstallCode + a Touchlink mode constant; the inter-PAN frame layer is Phase 1b."

[[unmapped]]
area     = "Network key rotation (NLME-LEAVE.request to rejoin)"
priority = "phase-1b"
note     = "Initial NWK key is set at coordinator init; rotation requires reauthing every device — Phase 1b."

[[unmapped]]
area     = "EZSP secure-boot / NCP firmware update"
priority = "phase-1b"
note     = "Out of band, requires Silicon Labs xmodem flasher; Phase 1 only initialises an existing NCP."

[[unmapped]]
area     = "Texas Instruments Z-Stack / ZNP coordinator family (CC2531, CC26x2)"
priority = "phase-1b"
note     = "Phase 1 covers EZSP + deCONZ; ZNP serial protocol is an additional transport family — straightforward to add in Phase 1b."

[[unmapped]]
area     = "Wireshark-class packet capture / network diagnostics"
priority = "phase-1b"
note     = "Diagnostics UI ships in Phase 1b once the coordinator is verifiably stable."

[[unmapped]]
area     = "32-bit ARM / pre-Linux 7.1 kernels"
priority = "permanent"
note     = "Charter §6.2 / ADR-003 — Linux 7.1+ only."

[[unmapped]]
area     = "Pre-Zigbee-3.0 (HA / ZLL profile-id routing)"
priority = "permanent"
note     = "Charter §8 — no backwards compatibility. Zigbee 3.0 unified profile only."

[[unmapped]]
area     = "Zigbee2MQTT JS converter ecosystem"
priority = "permanent"
note     = "Z2M is GPL-3.0; the converters cannot be read or ported. cave-home models devices via ZCL paths plus per-device quirks (clean-room)."

