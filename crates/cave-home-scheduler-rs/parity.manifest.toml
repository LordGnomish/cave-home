# cave-home-scheduler-rs — line-by-line port manifest (Phase 2 MVP).
#
# Honest scoping: pkg/scheduler is ~25 kLOC of production Go across
# framework, plugins, queue, cache, profile, preemption, and the
# scheduleOne driver. Phase 2 ships the default-profile slice only
# (filters + scores + priority-based preemption). The fill_ratio
# reflects Rust src LOC against that upstream baseline.

[crate]
name             = "cave-home-scheduler-rs"
upstream_repo    = "kubernetes/kubernetes"
upstream_release = "v1.36.1"
upstream_sha     = "756939600b9a7180fc2df6550a4585b638875e67"
upstream_subpath = "pkg/scheduler"
ported_at        = "2026-05-15"
linux_min_kernel = "7.1"

[ratios]
# Production-only src LOC (~2.37 kLOC, measured by stripping each module
# at the first `#[cfg(test)]` boundary) divided by the upstream
# pkg/scheduler production baseline (~25 kLOC of Go, excluding _test.go)
# = 0.095. Hand-ported tests live inline in each src module and add
# ~1.49 kLOC; counting those into a separate test ratio gives a
# test_port_ratio of ~0.06.
fill_ratio      = 0.095
test_port_ratio = 0.06

