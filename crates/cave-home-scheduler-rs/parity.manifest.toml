# ---- no-backcompat (Charter §8) ---------------------------------------------
# Recorded explicitly so the stance is auditable: this crate ships against the
# current kube-scheduler default-profile behaviour only. No pre-Linux-5.0 or
# Windows code paths and no historical scheduler-policy (pre-framework) mode are
# carried; the relevant items are listed as `permanent` [[unmapped]] above.
