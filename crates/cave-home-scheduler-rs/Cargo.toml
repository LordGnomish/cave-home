[package]
name              = "cave-home-scheduler-rs"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace   = true
description = "cave-home-scheduler-rs — Kubernetes scheduler decision core; upstream: kubernetes/kubernetes (K3s-vendored); port method: behavioural reimplementation (spec/contract-based; not verbatim line-by-line) (Orchestration Phase 2, ADR-004)"

[package.metadata.cave-home]
upstream    = "kubernetes/kubernetes (K3s-vendored)"
# Behavioural reference only; not a verbatim transcription. A prior pinned SHA
# was unverified (reused across k3s crates) and was removed.
port-method = "behavioural-reimplementation"
phase       = "orchestration-phase-2"

[package.metadata.upstream]
repo    = "kubernetes/kubernetes"
release = "v1.36.1 (behavioural reference)"
subpath = "pkg/scheduler"

[dependencies]
async-trait = "0.1"
parking_lot = "0.12"
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
thiserror   = "2"
tokio       = { version = "1", features = ["rt-multi-thread", "sync", "macros", "time"] }
tracing     = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros", "time", "test-util"] }
# Integration-test-only: proves the scheduler's SchedulerSource/Sink seam wires
# to the real cave-home-apiserver-rs Registry (read unscheduled Pods + Nodes,
# write the binding back). Kept out of [dependencies] so the library stays
# transport-agnostic — the wire lives entirely in tests/apiserver_integration.rs.
cave-home-apiserver-rs = { path = "../cave-home-apiserver-rs" }

[lints]
workspace = true
