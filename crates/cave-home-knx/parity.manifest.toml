# cave-home-knx — parity manifest scaffold.
#
# Charter v2 G4: every crate ships a parity.manifest.toml. This is the
# scaffold form — fill_ratio is bumped as the line-by-line port lands.
# cave-home-knx — KNX/IP stack: xknx line-by-line port (transport, telegrams, DPTs) + clean-room KNXd-equivalent gateway daemon (KNX Association public spec only; KNXd GPL-3.0 source NOT read)

[crate]
name             = "cave-home-knx"
upstream_repo    = "XKNX/xknx (MIT) + KNXd (GPL-3.0, NOT read — clean-room recusal)"
port_method      = "mixed (xknx line-by-line; knxd-equivalent clean-room)"
ported_at        = "2026-05-25"
linux_min_kernel = "7.1"

[ratios]
fill_ratio              = 0.00
fill_ratio_basis        = "scaffold + manifest only (real port lands in phase 1)"
fill_ratio_full_module  = 0.00
test_port_ratio         = 0.00

