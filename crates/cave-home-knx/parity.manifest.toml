# cave-home-knx — parity manifest.
#
# Phase 1 ships the KNX *codec engine*: the datapoint-type (DPT) encode/decode
# logic, the group/individual address model, and the group-telegram (APDU)
# framing — all pure byte logic, std-only, no network or hardware. This is the
# layer every higher KNX feature consumes: a transport (KNXnet/IP, TPUART) only
# moves these bytes, and a gateway only routes these telegrams. Those I/O layers
# are network/hardware-bound and deferred to Phase 1b, each enumerated below
# with an ADR-011 disposition.
#
# Port method: the DPT tables and the application-layer (APCI) framing rules are
# implemented from the PUBLIC KNX standard. xknx (MIT) was used as a public-
# behavior reference (e.g. the DPT 9 worked example), all Apache-2.0-compatible;
# the code is first-party. KNXd (GPL-3.0) was NOT read — the gateway daemon is a
# deferred clean-room item (no GPL source consulted at any point, Charter §6.1 /
# ADR-002). No backward-compatibility / legacy-snapshot mode is shipped
# (Charter §8 no-backcompat).

[crate]
name             = "cave-home-knx"
upstream_repo    = "Public KNX standard (DPT/APCI tables); XKNX/xknx (MIT, public behavior referenced); KNXd (GPL-3.0, NOT read — clean-room recusal)"
port_method      = "spec-based (public KNX DPT/APCI tables) + xknx-MIT public-behavior reference; knxd clean-room (deferred)"
upstream_license = "Apache-2.0 (own) / MIT (xknx, referenced)"
spec_sources     = [
    "KNX Standard — Datapoint Types (DPT main types 1, 2, 3, 5, 6, 7, 8, 9, 12, 13, 14, 16)",
    "KNX 2-byte float (DPT 9.x) encoding: value = 0.01 * mantissa * 2^exponent (sign + 4-bit exp + 11-bit signed mantissa)",
    "KNX group address notations (3-level main/middle/sub, 2-level main/sub, free 16-bit)",
    "KNX individual address (area.line.device) layout (4/4/8 bits)",
    "KNX application layer — GroupValueRead / GroupValueWrite / GroupValueResponse APCI codes + ≤6-bit small-payload optimization",
]
ported_at        = "2026-05-29"
linux_min_kernel = "7.1"

[ratios]
# fill_ratio is against the FULL crate scope (codec engine + transports +
# gateway daemon + ETS import + core integration). The codec engine — DPT
# codec, address model, telegram/APDU framing, EN/DE/TR UX — is implemented and
# tested in full; the network/hardware I/O layers remain and are all ADR-011
# justified Phase 1b.
fill_ratio              = 0.35
fill_ratio_basis        = "DPT codec (1/2/3/5/6/7/8/9/12/13/14/16) + group/individual address model + group-telegram APDU codec + EN/DE/TR UX, fully implemented & tested; transports/gateway/ETS/core-integration deferred"
test_port_ratio         = 0.0   # tests designed from the spec, not ported
adr_justified_ratio     = 1.00  # every unfilled item below carries an ADR-011 phase disposition
honest_ratio            = 1.00  # 0.35 / (0.35 + unjustified_gap=0)

# ---- mapped (real implementation present in this crate) --------------------

[[mapped]]
spec = "KNX group address — 3-level / 2-level / free notation, parse ⇄ raw u16 ⇄ string, range validation"
ours = "src/address.rs::GroupAddress"

[[mapped]]
spec = "KNX individual address area.line.device (4/4/8 bits), parse ⇄ raw ⇄ string"
ours = "src/address.rs::IndividualAddress"

[[mapped]]
spec = "DPT 1.x — 1-bit boolean (switch / up-down / open-close)"
ours = "src/dpt.rs::dpt1"

[[mapped]]
spec = "DPT 2.x — 1-bit value + control flag (2-bit field)"
ours = "src/dpt.rs::dpt2"

[[mapped]]
spec = "DPT 3.x — 4-bit dimming / blind control (direction + step code)"
ours = "src/dpt.rs::dpt3"

[[mapped]]
spec = "DPT 5.x — 1-byte unsigned: scaling 0..=100 %, angle 0..=360°, raw (round-half-up)"
ours = "src/dpt.rs::dpt5"

[[mapped]]
spec = "DPT 6.x — 1-byte signed (two's complement)"
ours = "src/dpt.rs::dpt6"

[[mapped]]
spec = "DPT 7.x / 8.x — 2-byte unsigned / signed, big-endian"
ours = "src/dpt.rs::{dpt7,dpt8}"

[[mapped]]
spec = "DPT 9.x — KNX 2-byte float (sign, 4-bit exponent, 11-bit signed mantissa; value = 0.01·M·2^E)"
ours = "src/dpt.rs::dpt9"

[[mapped]]
spec = "DPT 12.x / 13.x — 4-byte unsigned / signed, big-endian"
ours = "src/dpt.rs::{dpt12,dpt13}"

[[mapped]]
spec = "DPT 14.x — 4-byte IEEE-754 single-precision float, big-endian"
ours = "src/dpt.rs::dpt14"

[[mapped]]
spec = "DPT 16.x — 14-byte fixed-width string, null-padded"
ours = "src/dpt.rs::dpt16"

[[mapped]]
spec = "Application services — GroupValueRead / Write / Response APCI codes"
ours = "src/apci.rs::GroupService"

[[mapped]]
spec = "Group telegram APDU framing incl. ≤6-bit small-payload optimization"
ours = "src/telegram.rs::GroupTelegram"

[[mapped]]
spec = "Grandma-friendly EN/DE/TR action descriptions (light/blinds/temperature, ADR-007 / Charter §6.3)"
ours = "src/label.rs::Action"

# ---- spec sections this crate implements -----------------------------------

[[spec_section]]
section = "KNX DPT main types 1–16 (residential subset)"
ours    = "src/dpt.rs"

[[spec_section]]
section = "KNX group & individual address model"
ours    = "src/address.rs"

[[spec_section]]
section = "KNX application layer group communication (APCI + APDU framing)"
ours    = "src/apci.rs + src/telegram.rs"

# ---- unmapped (NOT in this crate; ADR-011 Phase 1b/2 disposition) ----------

[[unmapped]]
area     = "KNXnet/IP tunneling + routing transport (UDP wire protocol)"
priority = "phase-1b"
note     = "ADR-011: the KNXnet/IP service-code framing (CONNECT/TUNNELING_REQUEST, routing multicast 224.0.23.12) carries the telegrams this codec already encodes. Network-bound (UDP sockets); adds no datapoint logic — it wraps src/telegram.rs."

[[unmapped]]
area     = "USB / TPUART serial transport (KNX-TP1 bus access)"
priority = "phase-1b"
note     = "ADR-011: the TPUART serial framing for direct twisted-pair bus access. Hardware-bound (serial device); moves the same telegram bytes this crate produces."

[[unmapped]]
area     = "knxd-equivalent gateway daemon (clean-room)"
priority = "phase-1b"
note     = "ADR-011 / Charter §6.1: a KNXnet/IP routing daemon built EXCLUSIVELY from the KNX Association public service-code table. KNXd is GPL-3.0 and its source is NOT read. Network-bound service; deferred until the transport lands."

[[unmapped]]
area     = "ETS project import (group-address ⇄ DPT mapping)"
priority = "phase-1b"
note     = "ADR-011: importing an installer's ETS export to learn which group address speaks which DPT. File-format/parser work that configures, but is not part of, this pure codec."

[[unmapped]]
area     = "cave-home-core entity / automation integration"
priority = "phase-1b"
note     = "ADR-011: surfacing KNX groups as core State entities + automation triggers lands once cave-home-core's entity API stabilises. The codec is already core-agnostic."

[[unmapped]]
area     = "Legacy / pre-current KNX DPT snapshot compatibility mode"
priority = "permanent"
note     = "Charter §7 always-latest + §8 no-backcompat: cave-home ships the current public KNX DPT encodings only; no historical-snapshot or legacy compatibility mode."

# ---- spec_test (designed from the public KNX spec / reference values) ------

[[spec_test]]
designed_for = "Group/individual address parse ⇄ raw ⇄ string round-trip + range rejection (all three notations)"
ours         = "src/address.rs::tests"

[[spec_test]]
designed_for = "DPT 9 KNX-float known values (21.0 °C → 0x0C1A, 0.01 → 0x0001, 0.0 → 0x0000, negatives) + range/NaN rejection"
ours         = "src/dpt.rs::tests::{dpt9_known_temperature_21c,dpt9_known_zero_point_zero_one,dpt9_zero,dpt9_negative_values,dpt9_rejects_out_of_range_and_nan}"

[[spec_test]]
designed_for = "DPT 5 scaling rounding (50 % → 128 via round-half-up) + endpoints + out-of-range rejection"
ours         = "src/dpt.rs::tests::{dpt5_scaling_endpoints_and_rounding,dpt5_scaling_rejects_out_of_range}"

[[spec_test]]
designed_for = "Every DPT (1/2/3/5/6/7/8/9/12/13/14/16) encode+decode round-trip and wrong-length rejection"
ours         = "src/dpt.rs::tests"

[[spec_test]]
designed_for = "Group-telegram APDU encode/decode incl. ≤6-bit small-payload optimization + short/unknown-APDU rejection"
ours         = "src/telegram.rs::tests"

[[spec_test]]
designed_for = "Grandma-friendly UX carries no implementation jargon (Charter §6.3)"
ours         = "src/label.rs::tests::ui_strings_carry_no_implementation_jargon"
