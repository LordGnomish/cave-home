# SPDX-License-Identifier: Apache-2.0
#
# cave-home-containerd-rs parity manifest — Phase 1 MVP.
# Mirrors the Cave golden rules (8) honest accounting:
#   * mapped     = upstream symbol with real Rust port
#   * unmapped   = upstream symbol intentionally NOT yet ported
#                  (each entry has a reason + priority)
#   * fill_ratio = mapped / (mapped + unmapped)  — honest, no inflation

[crate]
name             = "cave-home-containerd-rs"
upstream_repo    = "containerd/containerd"
upstream_release = "v2.3.0"
upstream_sha     = "2976f38ccbfcda5ef1364d63d60b0a304e4bf94a"
ported_at        = "2026-05-15"
linux_min_kernel = "7.1"
phase            = "orchestration-phase-1"

[ratios]
# 32 mapped / (32 + 26) = 0.5517 — but mapped count is symbol-count,
# not weight; the runtime/streaming/exec surface area dominates the
# unmapped weight. Honest weighted estimate: ≈ 0.22.
fill_ratio       = 0.22
test_port_ratio  = 0.85   # 58 ports of upstream test cases / ~68 plausible upstream cases at this surface

