# ---- unmapped (NOT in this crate; ADR-004 Phase 2b disposition) -------------

[[unmapped]]
area     = "staging/src/k8s.io/client-go/tools/cache/reflector.go + listwatch.go (the watch loop that FILLS the store from the apiserver)"
priority = "phase-2"
note     = "Reflector/ListWatch is pure apiserver I/O (List+Watch, resourceVersion bookmarks, relist on expiry). This crate is the consumer side: it is pure over deltas handed in, so the Store/DeltaFifo are already correct; only the network producer is deferred."

[[unmapped]]
area     = "staging/src/k8s.io/client-go/kubernetes (the apiserver Clientset / REST client)"
priority = "phase-2"
note     = "All controllers here compute a decision (delete set, taint actions, finalizer/TTL outcome) over an in-memory object set; actually applying it (DELETE/PATCH against the apiserver) needs the typed REST client, which is network-bound and lands with the apiserver crate."

[[unmapped]]
area     = "pkg/controller leader election (client-go/tools/leaderelection)"
priority = "phase-2"
note     = "Lease-based single-active-manager election. Needed only once more than one controller-manager replica runs; the home cluster runs a single manager in Phase 2, so leader election is deferred."

[[unmapped]]
area     = "pkg/controller workload controllers (deployment, replicaset, daemonset, statefulset, job, cronjob, serviceaccount+token)"
priority = "phase-2"
note     = "The dozens of other controllers reuse the framework spine shipped here (workqueue + reconcile + informer). They were previously stubbed against an unreal async client; they are deferred until the apiserver client lands so they can be implemented and tested end-to-end rather than against a phantom backend."

[[unmapped]]
area     = "pkg/controller/podautoscaler (HPA), endpoint/endpointslice, resourcequota, disruption (PDB), volume (PV/PVC), certificates, bootstrap"
priority = "phase-2"
note     = "Secondary controllers; several depend on other subsystems (metrics-server for HPA, cave-home-kube-proxy-rs for endpoints, CSI for volumes). Deferred behind the core workload set."

[[unmapped]]
area     = "pkg/controller/cloud (cloud-provider controllers) + Service cloud-LB controller"
priority = "permanent"
note     = "The cave-home cluster is a home cluster with no cloud provider and no cloud load balancer; these controllers are permanently out of scope (ADR-004)."

[[unmapped]]
area     = "pkg/controller/nodeipam (cluster-CIDR allocation)"
priority = "phase-2"
note     = "Node IPAM/CIDR allocation lives with the CNI integration for now; deferred from the controller-manager core."

[[unmapped]]
area     = "controller-manager Prometheus metrics (workqueue depth/latency, controller sync duration)"
priority = "phase-2"
note     = "Metric registration is observability wiring over the same decision core; the queue already exposes ready_len/delayed_len/retries for a future metrics adapter."

[[unmapped]]
area     = "client-go workqueue background goroutine + real wall-clock + maxFilled-rate token-bucket limiter"
priority = "phase-2"
note     = "This crate's queue is single-threaded and clock-injected (caller supplies `now`) so the decision logic is pure and testable. The concurrent waiting-loop and the BucketRateLimiter (global QPS cap) are run-loop concerns deferred to the manager wiring."

[[unmapped]]
area     = "Windows-only + pre-Linux-5.0 controller code paths"
priority = "permanent"
note     = "Charter §3 / §8 no-backcompat: Linux 7.1+ (kernel 5.0+) baseline only; no legacy or Windows code paths are carried."

# ---- spec_test (designed from the documented controller contracts) ----------
# These are NOT ported from upstream _test.go (port_method is contract-based).
# Each `designed_for` names the behaviour under test and the package whose
# documented contract it mirrors.

[[spec_test]]
designed_for = "Workqueue: FIFO order, hard dedup of a re-added key, dirty-while-processing requeues exactly once on done, done-without-readd is a no-op (client-go Type contract)"
ours         = "src/workqueue.rs::tests"

[[spec_test]]
designed_for = "Workqueue exponential backoff curve (base*2^(n-1), clamped to max) + add_rate_limited schedules growing delays + drops after max-retries + forget resets backoff (ItemExponentialFailureRateLimiter contract)"
ours         = "src/workqueue.rs::tests::{backoff_curve_doubles_per_failure,backoff_curve_caps_at_max_delay,rate_limited_add_schedules_growing_delays,rate_limited_add_drops_after_max_retries,forget_resets_backoff}"

[[spec_test]]
designed_for = "Delaying add: not ready until due, zero-delay is immediate, earliest ready-time wins, immediate add supersedes a pending delay (DelayingInterface.AddAfter contract)"
ours         = "src/workqueue.rs::tests::{add_after_is_not_ready_until_due,add_after_zero_delay_is_immediate,add_after_keeps_earliest_ready_time,immediate_add_beats_pending_delay,delayed_items_become_ready_in_due_order}"

[[spec_test]]
designed_for = "Reconcile loop policy: Done forgets+no requeue, Requeue re-adds now, RequeueAfter schedules a delay, Err rate-limits then drops after the budget, success resets backoff; step driver runs a reconciler to completion (controller-runtime Result contract)"
ours         = "src/reconcile.rs::tests"

[[spec_test]]
designed_for = "Store indexing: namespace index, label index (incl. cleanup on relabel), list_matching AND-semantics + upsert/get/remove round-trip (tools/cache Store/Indexer contract)"
ours         = "src/informer.rs::tests::{store_namespace_index,store_label_index,store_label_index_updates_on_relabel,store_list_matching_is_and_semantics,store_upsert_get_remove}"

[[spec_test]]
designed_for = "DeltaFifo: Added then Deleted, repeated-update coalescing, FIFO over keys, Replace syncs present + deletes vanished, apply_delta keeps the store in sync (DeltaFIFO contract)"
ours         = "src/informer.rs::tests::{fifo_emits_added_then_deleted,fifo_coalesces_repeated_updates,fifo_is_fifo_over_keys,fifo_replace_syncs_present_and_deletes_vanished,apply_delta_keeps_store_in_sync}"

[[spec_test]]
designed_for = "Garbage collector: rootless object never GC'd, present-owner survives, missing-owner orphan collected, one-live-owner-among-several survives, transitive cascade delete set, unrelated trees untouched, foreground blockers (garbagecollector contract)"
ours         = "src/controllers/gc.rs::tests"

[[spec_test]]
designed_for = "Node lifecycle: Ready/NotReady/Unreachable classification (incl. stale-heartbeat -> Unreachable and exact-grace boundary), taint add/remove/swap, eviction triggers only after the grace period, Ready node never evicts (nodelifecycle contract)"
ours         = "src/controllers/node_lifecycle.rs::tests"

[[spec_test]]
designed_for = "Cleanup: TTL-after-finished (no-ttl/elapsed/not-elapsed/zero-ttl/boundary) and namespace finalizer sweep (not-terminating/awaiting-content/remove-finalizer/already-finalized/dedup) (ttlafterfinished + namespace deletion contract)"
ours         = "src/controllers/cleanup.rs::tests"

[[spec_test]]
designed_for = "Object model: namespaced vs cluster-scoped key derivation, owner-reference builders, terminating reflects deletionTimestamp, label/finalizer builders (apimachinery ObjectMeta/OwnerReference contract)"
ours         = "src/types.rs::tests"

# ---- no-backcompat (Charter §8) ---------------------------------------------
# Recorded explicitly so the stance is auditable: this crate ships against the
# current kube-controller-manager behaviour only. No pre-Linux-5.0 or Windows
# code paths and no legacy controller modes are carried; those items are listed
# as `permanent` [[unmapped]] above.
