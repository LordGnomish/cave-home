# ---- spec_test (designed from the documented controller contracts) ----------
# These are NOT ported from upstream _test.go (port_method is contract-based).
# Each `designed_for` names the behaviour under test and the package whose
# documented contract it mirrors.

[[spec_test]]
designed_for = "Workqueue: FIFO order, hard dedup of a re-added key, dirty-while-processing requeues exactly once on done, done-without-readd is a no-op (client-go Type contract)"
ours         = "src/workqueue.rs::tests"

[[spec_test]]
designed_for = "Workqueue exponential backoff curve (base*2^(n-1), clamped to max) + add_rate_limited schedules growing delays + drops after max-retries + forget resets backoff (ItemExponentialFailureRateLimiter contract)"
ours         = "src/workqueue.rs::tests::{backoff_curve_doubles_per_failure,backoff_curve_caps_at_max_delay,rate_limited_add_schedules_growing_delays,rate_limited_add_drops_after_max_retries,forget_resets_backoff}"

[[spec_test]]
designed_for = "Delaying add: not ready until due, zero-delay is immediate, earliest ready-time wins, immediate add supersedes a pending delay (DelayingInterface.AddAfter contract)"
ours         = "src/workqueue.rs::tests::{add_after_is_not_ready_until_due,add_after_zero_delay_is_immediate,add_after_keeps_earliest_ready_time,immediate_add_beats_pending_delay,delayed_items_become_ready_in_due_order}"

[[spec_test]]
designed_for = "Reconcile loop policy: Done forgets+no requeue, Requeue re-adds now, RequeueAfter schedules a delay, Err rate-limits then drops after the budget, success resets backoff; step driver runs a reconciler to completion (controller-runtime Result contract)"
ours         = "src/reconcile.rs::tests"

[[spec_test]]
designed_for = "Store indexing: namespace index, label index (incl. cleanup on relabel), list_matching AND-semantics + upsert/get/remove round-trip (tools/cache Store/Indexer contract)"
