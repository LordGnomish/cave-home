[package]
name              = "cave-home-controller-manager-rs"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace   = true
description = "cave-home-controller-manager-rs — K3s controller-manager decision core (workqueue + reconcile + informer cache + GC/node-lifecycle/cleanup controllers); behavioural reimplementation of documented kube-controller-manager contracts (Orchestration Phase 2, ADR-004); std-only, I/O deferred"

[package.metadata.cave-home]
upstream    = "kubernetes/kubernetes (K3s-vendored)"
port-method = "behavioural-reimplementation"
