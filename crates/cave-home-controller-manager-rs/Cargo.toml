[package.metadata.upstream]
repo    = "kubernetes/kubernetes"
release = "v1.36.1"
subpath = "pkg/controller (behavioural reference, not verbatim)"

# std-only: no async runtime, no clock crate (caller supplies `now`),
# no third-party deps. The decision core is pure and panic-free.

[lints]
workspace = true
