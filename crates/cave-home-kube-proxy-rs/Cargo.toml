[package]
name              = "cave-home-kube-proxy-rs"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace   = true
description = "cave-home-kube-proxy-rs — service-proxy decision core (Service/EndpointSlice -> forwarding rules); behavioural reimplementation of the documented kube-proxy algorithm + iptables ClusterIP lowering (Orchestration Phase 1, ADR-004)"

[package.metadata.cave-home]
spec-sources     = "public Kubernetes Service/EndpointSlice API + kube-proxy concepts docs (see parity.manifest.toml)"
port-method      = "behavioral-reimplementation"
phase            = "orchestration-phase-1"

[dependencies]
thiserror   = "1"
sha2        = "0.10"
base32      = "0.5"
parking_lot = "0.12"
async-trait = "0.1"
tokio       = { version = "1", features = ["rt", "rt-multi-thread", "sync", "macros", "time", "process"] }

[target.'cfg(target_os = "linux")'.dependencies]
nix = { version = "0.29", features = ["fs"] }

[dev-dependencies]
tokio = { version = "1", features = ["rt", "rt-multi-thread", "sync", "macros", "time", "process", "test-util"] }

[lints]
workspace = true
