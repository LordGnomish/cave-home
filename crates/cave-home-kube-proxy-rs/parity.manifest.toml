# cave-home-kube-proxy-rs parity manifest
#
# Tracks line-by-line port relationship to upstream `kubernetes/kubernetes`
# `pkg/proxy/iptables` (Phase 1 MVP — ClusterIP routing only).

[crate]
name             = "cave-home-kube-proxy-rs"
upstream_repo    = "kubernetes/kubernetes"
upstream_release = "v1.36.1"
upstream_sha     = "756939600b9a7180fc2df6550a4585b638875e67"
upstream_subpath = "pkg/proxy/iptables"
ported_at        = "2026-05-15"
linux_min_kernel = "7.1"

[ratios]
# Honest measurement (not aspirational).
# Numerator   = ported feature surface (ClusterIP iptables-mode rule generator
#               + ServiceCache + EndpointSliceCache + executor + reconciler).
# Denominator = entire pkg/proxy/ tree (iptables/, ipvs/, nftables/, util/,
#               topology, healthz, metrics, conntrack, NodePort, LoadBalancer,
#               ExternalIP, dual-stack v6, etc.).
# Phase 1 deliberately excludes huge chunks; ratio reflects that.
fill_ratio      = 0.12
test_port_ratio = 0.18

