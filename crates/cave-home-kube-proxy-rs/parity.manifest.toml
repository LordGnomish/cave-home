ours         = "tests/core_select_test.rs::{only_ready_endpoints_selected, unset_ready_condition_treated_as_ready, terminating_endpoint_excluded_from_normal_set, terminating_fallback_used_when_no_ready}"

[[spec_test]]
designed_for = "Topology-aware hint filtering + fail-open semantics"
ours         = "tests/core_select_test.rs::{topology_hints_restrict_to_local_zone, topology_hints_ignored_when_not_all_endpoints_hinted, topology_hints_fail_open_when_local_zone_has_none, topology_hints_inactive_without_node_zone}"

[[spec_test]]
designed_for = "externalTrafficPolicy Local vs Cluster external endpoint selection"
ours         = "tests/core_select_test.rs::{external_policy_cluster_uses_all_ready, external_policy_local_keeps_only_local_node, external_policy_local_empty_when_no_local_endpoint}"

[[spec_test]]
designed_for = "Named target-port resolution + multi-slice merge + dedup/sort determinism"
ours         = "tests/core_select_test.rs::{target_port_resolved_from_named_slice_port, endpoints_merged_across_slices_and_sorted, duplicate_endpoint_addresses_deduped, no_matching_port_yields_no_endpoints}"

[[spec_test]]
designed_for = "Rule generation: ClusterIP / NodePort / LoadBalancer frontends + multi-port service"
ours         = "tests/core_rules_test.rs::{clusterip_service_emits_single_clusterip_rule, multiport_service_emits_one_rule_per_port, nodeport_service_emits_clusterip_and_nodeport_frontends, loadbalancer_service_emits_clusterip_nodeport_and_lb_frontends}"

[[spec_test]]
designed_for = "sessionAffinity ClientIP sticky mode + zero-endpoint REJECT (not black hole) + Local-policy external reject"
ours         = "tests/core_rules_test.rs::{session_affinity_clientip_sets_sticky_mode, zero_ready_endpoints_yields_reject_not_blackhole, local_policy_with_no_local_endpoint_rejects_external_only}"

[[spec_test]]
designed_for = "Headless/ExternalName skipping + deterministic rule order"
ours         = "tests/core_rules_test.rs::{headless_service_is_skipped, externalname_service_is_skipped, build_is_deterministic}"

[[spec_test]]
designed_for = "Incremental rule diff: adds / removes / changes (reject<->forward, backend change, combined)"
