# cave-home-kube-proxy-rs — parity manifest.
#
# This crate is the service-proxy *decision core* for the cave-home K3s-style
# orchestration layer (ADR-004). It turns Services + EndpointSlices into
# packet-forwarding rules.
#
# HONEST PORT METHOD. This is a *behavioural reimplementation of the documented
# kube-proxy algorithm* (the public Kubernetes Service/EndpointSlice API plus
# the documented kube-proxy data-plane concepts). It is NOT a verbatim
# line-by-line transcription of a specific k3s / kubernetes/kubernetes source
# revision — no such source was read for this implementation. ADR-004 frames
# the orchestration layer's long-term goal as a line-by-line k3s port; the
# verbatim-parity remainder for this component is therefore enumerated below as
# ADR-004 phase-1b deferred work, not claimed as done.
#
# Charter §6.3: this is INFRASTRUCTURE, hidden from end-users. It produces no
# user-facing strings and carries no grandma-friendly / i18n labels by design.

[crate]
name         = "cave-home-kube-proxy-rs"
upstream_repo = "kubernetes/kubernetes + k3s-io/k3s (kube-proxy, behavioural reference target per ADR-004)"
port_method  = "behavioural reimplementation of documented kube-proxy algorithm; full line-by-line k3s port deferred (ADR-004 phase-1b)"
spec_sources = [
    "Kubernetes Service API — k8s.io/api/core/v1 (Service, ServicePort, ServiceType, SessionAffinity, ExternalTrafficPolicy)",
    "Kubernetes EndpointSlice API — k8s.io/api/discovery/v1 (EndpointSlice, Endpoint, EndpointConditions ready/serving/terminating, hints.forZones)",
    "Kubernetes docs: Service (concepts/services-networking/service)",
    "Kubernetes docs: Virtual IPs and Service Proxies (kube-proxy iptables mode, endpoint selection, session affinity)",
    "Kubernetes docs: Topology Aware Routing (hints.forZones, fail-open behaviour)",
    "Kubernetes docs: ExternalTrafficPolicy / InternalTrafficPolicy (Local vs Cluster external endpoint selection)",
    "Documented KUBE-SERVICES/KUBE-SVC-/KUBE-SEP- chain layout + base32(SHA-256)[:16] chain-name hashing scheme",
]
ported_at        = "2026-05-29"
linux_min_kernel = "7.1"  # ADR-003: Linux-only deployment baseline.

[ratios]
# Denominator = the entire kube-proxy scope: the decision core PLUS three wire
# backends' rule *programming* (iptables/ipvs/nftables), conntrack reconciliation,
# the netlink/iptables exec + controller wiring, healthz, metrics, dual-stack v6.
# Numerator = the decision core (model + validation + endpoint selection +
# backend-agnostic ProxyRule IR + generation + incremental diff) AND the
# iptables ClusterIP lowering + Linux executor + event-driven cache + debounced
# reconciler — all implemented and tested here. Everything still in the gap is
# enumerated below with an ADR-004 phase disposition, so the honest ratio
# reflects the implemented share of what remains in scope.
fill_ratio          = 0.35
fill_ratio_basis    = "decision core (model/validate/select/rules+diff) + iptables ClusterIP lowering + executor + cache + reconciler implemented & tested; multi-backend wire programming, conntrack, controller wiring deferred"
test_port_ratio     = 0.0   # tests designed from the documented spec, not ported
adr_justified_ratio = 1.00  # every unfilled item below carries an ADR-004 phase disposition + note
honest_ratio        = 1.00  # 0.35 / (0.35 + (1-0.35)*(1-1.0)) = 1.00

# ---------------------------------------------------------------------------
# [[mapped]] — documented kube-proxy concept -> cave-home Rust path
# ---------------------------------------------------------------------------

[[mapped]]
spec = "Service / ServicePort / ServiceType (ClusterIP/NodePort/LoadBalancer/ExternalName), sessionAffinity, externalTrafficPolicy"
ours = "src/core/model.rs::{Service, ServicePort, ServiceType, SessionAffinity, ExternalTrafficPolicy}"

[[mapped]]
spec = "EndpointSlice / Endpoint / EndpointConditions (ready/serving/terminating tri-state), zone + node + hints.forZones"
ours = "src/core/model.rs::{EndpointSlice, Endpoint, EndpointConditions, EndpointPort}"

[[mapped]]
spec = "ShouldSkipService — headless (clusterIP:None) and ExternalName services are not proxied"
ours = "src/core/model.rs::Service::should_skip (+ src/api/mod.rs::Service::should_skip iptables-MVP subset)"

[[mapped]]
spec = "Malformed Service / EndpointSlice rejection (kube-proxy logs+skips rather than crashing)"
ours = "src/core/validate.rs::{validate_service, validate_slice, ValidationError}"

[[mapped]]
spec = "Endpoint readiness selection — only ready+serving, non-terminating endpoints receive normal traffic; unset ready==ready"
ours = "src/core/select.rs::select_endpoints (+ Endpoint::is_ready_serving)"

[[mapped]]
spec = "Terminating-endpoint fallback — serving-terminating endpoints used only when the ready set is empty (ProxyTerminatingEndpoints)"
ours = "src/core/select.rs::select_endpoints (from_terminating path)"

[[mapped]]
spec = "Topology-aware hints — restrict to endpoints hinted for the node's zone; fail-open when not all hinted or the zone would be black-holed"
ours = "src/core/select.rs::apply_topology_hints"

[[mapped]]
spec = "externalTrafficPolicy Local vs Cluster — external traffic uses local-node endpoints only (Local) or the full set (Cluster)"
ours = "src/core/select.rs::select_endpoints (SelectedEndpoints.external)"

[[mapped]]
spec = "sessionAffinity ClientIP — sticky load-balancing with a TTL"
ours = "src/core/rules.rs::lb_mode -> LoadBalanceMode::ClientIpSticky"

[[mapped]]
spec = "Service:Port -> frontend(VIP/NodePort/LB) + load-balanced backend set IR (backend-agnostic ProxyRule)"
ours = "src/core/rules.rs::{ProxyRule, Frontend, RuleAction, LoadBalanceMode, build_rules}"

[[mapped]]
spec = "Zero ready endpoints -> REJECT (ICMP) rather than a stale-DNAT black hole"
ours = "src/core/rules.rs::action_for -> RuleAction::Reject"

[[mapped]]
spec = "Incremental sync — compute add/remove/change delta between successive rule sets"
ours = "src/core/rules.rs::{diff_rules, RuleDiff}"

[[mapped]]
spec = "iptables chain naming — KUBE-SVC-/KUBE-SVL-/KUBE-FW-/KUBE-EXT-/KUBE-SEP- + base32(SHA-256)[:16]"
ours = "src/iptables/chain_names.rs"

[[mapped]]
spec = "iptables ClusterIP rule lowering — KUBE-SERVICES -> KUBE-SVC- -> KUBE-SEP- dispatch with 1/N probability + KUBE-POSTROUTING/KUBE-MARK-MASQ skeleton"
ours = "src/iptables/rules_builder.rs::build_proxy_rules"

[[mapped]]
spec = "iptables-restore --noflush --counters apply path with /run/xtables.lock advisory lock"
ours = "src/iptables/executor.rs::{IptablesExecutor, LinuxExecutor, MockExecutor}"

[[mapped]]
spec = "Event-driven Service/EndpointSlice caches with dirty tracking + deterministic snapshot"
ours = "src/cache/{service_cache.rs, endpointslice_cache.rs}"

[[mapped]]
spec = "Debounced reconcile loop (BoundedFrequencyRunner-style) with periodic full resync"
ours = "src/proxier/{proxier.rs, reconciler.rs}"

# ---------------------------------------------------------------------------
# [[unmapped]] — deferred / out-of-scope, each with an ADR-004 disposition
# ---------------------------------------------------------------------------

[[unmapped]]
area     = "Verbatim line-by-line k3s/kubernetes kube-proxy source port"
priority = "phase-1b"
note     = "ADR-004 frames the orchestration layer as a long-term line-by-line k3s port. Phase 1 ships a behavioural reimplementation from public docs; the verbatim-parity pass (matching upstream symbol-for-symbol) is deferred and must be done against the actual Apache-2.0 k3s source."

[[unmapped]]
area     = "iptables NodePort + LoadBalancer + KUBE-FW source-range rule *bodies* (wire programming)"
priority = "phase-1b"
note     = "The decision core computes NodePort/LoadBalancer frontends + Local/Cluster backend sets; the iptables lowering currently emits only the ClusterIP body + KUBE-NODEPORTS jump trailer. Emitting the NodePort/LB/firewall chain bodies is mechanical follow-up over the existing chain-name helpers."

[[unmapped]]
area     = "iptables externalTrafficPolicy=Local KUBE-EXT-/KUBE-SVL- chain *bodies* (wire programming)"
priority = "phase-1b"
note     = "Local-policy endpoint selection is implemented + tested in the decision core; chain-name helpers exist; emitting the KUBE-EXT-/KUBE-SVL- dispatch bodies is the remaining iptables-lowering work."

[[unmapped]]
area     = "IPVS backend (entire wire mode)"
priority = "phase-1b"
note     = "ADR-004: the ProxyRule IR is backend-agnostic so IPVS is an additional lowering of the same decision core; no decision-logic change. Deferred netlink/ipvsadm wire programming."

[[unmapped]]
area     = "nftables backend (entire wire mode)"
priority = "phase-1b"
note     = "ADR-004: another lowering of the ProxyRule IR (nft tables/sets). Deferred wire programming, no decision-logic change."

[[unmapped]]
area     = "conntrack reconciliation — flush stale conntrack entries when endpoints disappear or a Service becomes endpoint-less"
priority = "phase-1b"
note     = "ADR-004: required so existing flows don't pin to dead endpoints. Kernel-side (netlink/libnetfilter_conntrack) and pairs with the diff's removed/changed sets; deferred to the wire-programming phase."

[[unmapped]]
area     = "netlink / iptables-restore process exec + controller wiring (production reconcile path)"
priority = "phase-1b"
note     = "ADR-004: a LinuxExecutor exists; full controller wiring (watch -> cache -> diff -> apply with backoff/health) into the cave-home orchestration runtime lands when the apiserver watch source stabilises (see below)."

[[unmapped]]
area     = "Real apiserver Watch source (SharedInformer-style) feeding the caches"
priority = "phase-1b"
note     = "ADR-004: only an EventSource trait + MockEventSource exist; the production Watch wiring lives in the apiserver crate and is a workspace-integration concern, not decision-core logic."

[[unmapped]]
area     = "InternalTrafficPolicy=Local (cluster-internal local-endpoint routing)"
priority = "phase-1b"
note     = "ADR-004: analogous to externalTrafficPolicy=Local but for in-cluster traffic; a follow-up selection refinement over the same NodeContext local-ness signal already modelled."

[[unmapped]]
area     = "Dual-stack IPv6 service/endpoint family handling"
priority = "phase-1b"
note     = "ADR-004: the model uses std::net::IpAddr (v4/v6 agnostic); per-family rule splitting + v6 chain emission is deferred wire-programming work."

[[unmapped]]
area     = "healthz HTTP server + Prometheus metrics exporter"
priority = "phase-1b"
note     = "ADR-004: observability surface; not decision-core logic. Tracked with the crate's observability scaffolds."

[[unmapped]]
area     = "Deprecated userspace proxy mode + Windows winkernel mode"
priority = "permanent"
note     = "Charter §8 no-backcompat + ADR-003 Linux-only: userspace mode is upstream-deprecated and winkernel is Windows-only; neither will ever be ported."

