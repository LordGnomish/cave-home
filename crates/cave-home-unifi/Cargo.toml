[package]
name              = "cave-home-unifi"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace   = true
description = "cave-home-unifi — REAL Ubiquiti UniFi transport + API surface (Network Controller REST, Access Controller REST/WS, Protect REST/WS); HTTPS session/CSRF auth (legacy + UniFi OS + API-token), real-time WebSocket event subscription; unifies the unifi-network/-access/-protect domain cores behind one console client"

[package.metadata.cave-home]
upstream    = "Ubiquiti UniFi public local APIs (Network controller REST, Access developer REST/WS, Protect REST/WS) — community-documented protocol surface"
port-method = "spec-based (first-party clean-room from documented API shapes)"
adr         = "ADR-009"

[dependencies]
cave-home-unifi-network = { path = "../cave-home-unifi-network" }
cave-home-unifi-access  = { path = "../cave-home-unifi-access" }
cave-home-unifi-protect = { path = "../cave-home-unifi-protect" }
async-trait = "0.1"
base64      = "0.22"
futures-util = { version = "0.3", default-features = false, features = ["std", "sink"] }
parking_lot = "0.12"
reqwest     = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
rustls      = { version = "0.23", default-features = false, features = ["ring", "std", "tls12"] }
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
thiserror   = "2"
tokio       = { version = "1", features = ["rt-multi-thread", "sync", "macros", "time", "net"] }
tokio-tungstenite = { version = "0.29", default-features = false, features = ["rustls-tls-native-roots", "connect"] }
tracing     = "0.1"
url         = "2"

[dev-dependencies]
tokio    = { version = "1", features = ["rt-multi-thread", "sync", "macros", "time", "test-util"] }
wiremock = "0.6"

[lints]
workspace = true
