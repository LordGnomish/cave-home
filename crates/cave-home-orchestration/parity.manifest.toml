# =============================================================================
# local-path-provisioner port (src/local_path_provisioner/) — ADDED 2026-06-07
# =============================================================================
# A SECOND upstream is ported into this crate as the `local_path_provisioner`
# module: rancher/local-path-provisioner (NOT k3s-io/k3s). K3s bundles it as the
# default StorageClass; the cave-home single-binary mandate (Charter §5, ADR-004)
# makes it a MODULE here, not a separate Deployment/pod (no local-path-storage
# manifest, no per-crate Helm chart). Provenance is FAITHFUL line-by-line:
# provisioner.go + util.go + the default configmap setup/teardown scripts at tag
# v0.0.36 were READ and the DECISION half reimplemented in Rust. The RUNTIME half
# (K8s informer/watch, helper-pod create+poll, config-file load+watch, pod-log
# streaming, leader election) is I/O-bound and deferred to ADR-004 phase-1b —
# every item enumerated under [[lpp_unmapped]]. rancher/local-path-provisioner is
# Apache-2.0 (same as this crate); the port is licence-clean.

[lpp_crate]
upstream_repo    = "rancher/local-path-provisioner"
upstream_license = "Apache-2.0"
upstream_tag     = "v0.0.36"   # latest release at port time (always-latest mandate)
port_method      = "line-by-line behavioural port of the DECISION half from READ v0.0.36 source (provisioner.go + util.go + configmap setup/teardown)"
source_files     = ["provisioner.go", "util.go", "deploy/local-path-storage.yaml (setup/teardown)"]
ported_at        = "2026-06-07"

[lpp_ratios]
# Measured against the FULL provisioner scope (decision + runtime). The DECISION
# half — config canonicalization + validation, getPathOnNode path selection,
# Provision PVC-validation + PV-spec assembly, the helper-pod command/env/args
# construction, and the Delete/reclaim decision — is implemented and tested in
# full (53 integration tests, 8 strict test-first RED/GREEN pairs). The RUNTIME
# half is deferred (see below). Weighing the complete decision spine against the
# full controller lands ~0.45; deliberately conservative (a raw Go-LOC ratio
# against provisioner.go's I/O-heavy 946 lines would read lower because the I/O
# is intentionally out of scope for a decision core).
fill_ratio          = 0.45
fill_ratio_basis    = "config canonicalize/validate (lexical path clean, dedup, relative/root rejection, dup-node, shared-vs-local table, pickConfig), getPathOnNode (node fallback, requested-path, deterministic selector), pathFromPattern safe-prefix + filepath.IsLocal, Provision validation (selector/access-mode/node) + volume-type resolution + node-affinity + PvSpec, createHelperPod command/env/args/name/split, deleteFor + getPathAndNodeForPV — all implemented & tested; runtime (watch/pod-create-poll/config-watch/log-stream) deferred (ADR-004 phase-1b)"
test_port_ratio     = 0.0   # tests designed from the read v0.0.36 source behaviour, not ported from upstream _test.go
adr_justified_ratio = 1.00  # every [[lpp_unmapped]] gap carries a priority + note
honest_ratio        = 1.00

