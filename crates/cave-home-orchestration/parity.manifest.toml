ours = "src/bootstrap.rs::{FailureKind,Bootstrap::fail,Transition}"

[[mapped]]
spec = "Multi-node role assignment: homeowner intent (primary/backup hub, worker) -> server/agent role + cluster-init/join (ADR-005)"
ours = "src/role.rs::{NodeIntent,OrchestrationRole,validate_cluster}"

[[mapped]]
spec = "Per-role component selection + external prerequisites (server self-contained; agent needs remote apiserver)"
ours = "src/role.rs::{NodeIntent::components,NodeIntent::external_prerequisites}"

[[mapped]]
spec = "Graceful shutdown ordering = reverse of bring-up, with a tear-down safety predicate"
ours = "src/shutdown.rs::{shutdown_order,shutdown_order_with_external,is_safe_shutdown}"

# ---- unmapped (NOT in this crate; ADR-004 phase-1b disposition) -------------

[[unmapped]]
area     = "Actual in-process component supervision (run loops + restart/backoff for apiserver/scheduler/controller-manager/kubelet/proxy)"
priority = "phase-1b"
note     = "ADR-004: this crate decides the ORDER, the readiness gates and the retry CLASSIFICATION; the supervisor that actually spawns and restarts the in-process run loops is runtime-bound and lands with the per-component crates (cave-home-apiserver-rs etc.). The decision boundary is deliberately on this side; the run loops on that side."

[[unmapped]]
area     = "kine / datastore runtime (embedded SQLite engine + external etcd/Postgres/MySQL transport)"
priority = "phase-1b"
note     = "ADR-004 Phase 3: kine is the etcd-shim that fronts SQLite/SQL. This crate models the datastore CHOICE and validates the endpoint shape; the actual storage engine + watch/transaction transport ports under cave-home-kine-rs. No new decision logic — it consumes Datastore."

[[unmapped]]
area     = "TLS bootstrap + certificate generation/rotation (cluster CA, apiserver/kubelet serving + client certs)"
priority = "phase-1b"
note     = "ADR-004: cave-home models the token SHAPE only (no crypto, by mandate). The real cluster-CA issuance, the join-token -> bootstrap-credential exchange, and cert rotation are crypto/security-bound and are deferred; they consume the validated Token + ServerConfig this crate produces."

[[unmapped]]
area     = "Node-join handshake transport (agent -> server registration over the wire)"
priority = "phase-1b"
note     = "ADR-005 multi-node bootstrap. This crate decides cluster-init-vs-join and the server URL / role; the actual HTTPS handshake that registers an agent with a server is network-bound and lands with the apiserver bootstrap path + cave-home-node-discovery."

[[unmapped]]
area     = "containerd + CNI (flannel) runtime"
priority = "phase-1b"
note     = "ADR-004 Phase 1 / ADR-008: the container runtime and the flannel CNI data path are runtime/kernel-bound (cgroup v2, netlink). This crate models the CNI as a bring-up dependency of the kubelet; the actual runtime ports under cave-home-containerd-rs / cave-home-cni-flannel."

[[unmapped]]
area     = "Embedded image registry / mirror (K3s embedded distributed registry mirror, Spegel-class)"
priority = "phase-1b"
note     = "ADR-004: the optional embedded distributed registry mirror is a runtime/network component; it is not part of the bootstrap DECISION core and is deferred."

[[unmapped]]
area     = "Multi-server (HA) embedded-etcd quorum + leader election among 3+ control-plane nodes"
priority = "phase-1b"
note     = "ADR-005: this crate models the role assignment (one cluster-init primary + joining backup servers); the embedded-etcd quorum / leader-election that HA control-plane members run is consensus-bound and is owned jointly by the datastore runtime and cave-home-cluster. cave-home targets a 1–3 node household cluster (Charter §5)."

[[unmapped]]
area     = "Verbatim line-by-line transcription of k3s-io/k3s Go source"
priority = "permanent"
note     = "Charter §6: the HONEST port method here is a behavioural reimplementation from the public K3s architecture docs, not a byte-for-byte Go transcription. A verbatim port of the K3s server/agent boot is not a goal of this decision-core crate; the per-component crates carry their own (also behavioural) provenance."

[[unmapped]]
area     = "Windows / non-Linux-7.1 bootstrap paths"
priority = "permanent"
note     = "Charter §3 / ADR-003: Linux 7.1+ with cgroup v2 only; no legacy-cgroup or Windows bring-up path is modelled (no-backcompat, Charter §8)."

# ---- spec_test (designed from the documented K3s bootstrap contract) --------
# These are NOT ported from upstream _test.go (port_method is spec/contract-
# based). Each `designed_for` names the behaviour under test.

[[spec_test]]
designed_for = "Token shape validation (empty/short/whitespace rejected, plausible accepted) — NO crypto"
ours         = "src/config.rs::tests::{token_rejects_empty_short_and_whitespace,token_accepts_plausible_value}"

[[spec_test]]
designed_for = "Config validation: server init/agent validate; external datastore needs scheme; conflicting add-on flag+disable rejected; joining server / agent need valid URL; bad/empty/whitespace node name rejected"
ours         = "src/config.rs::tests"

[[spec_test]]
designed_for = "Component model: ALL is complete & unique, ids unique, dependency edges closed over the enum, control-plane classification, single-binary invariant holds"
ours         = "src/component.rs::tests"

[[spec_test]]
designed_for = "Bring-up topo order respects every documented edge (kine first), is deterministic, collapses duplicates; missing-dependency detected; readiness gating releases components as deps become ready; cycle detected via a cyclic edge function"
ours         = "src/bringup.rs::tests"

[[spec_test]]
designed_for = "External prerequisite (remote apiserver) makes an agent set plannable and is not itself placed in the local plan"
ours         = "src/bringup.rs::tests::{agent_only_set_orders_cni_kubelet_proxy_with_external_apiserver,external_prerequisite_satisfies_otherwise_missing_dependency}"

[[spec_test]]
designed_for = "Bootstrap state machine: happy-path Initializing->Running, transient retry without advancing, retry-budget exhaustion -> abort, fatal -> immediate abort, per-phase budget reset, retryability classification"
ours         = "src/bootstrap.rs::tests"

[[spec_test]]
designed_for = "Role assignment: intent->role mapping, only primary inits the cluster, server full set vs agent node-side set, single/empty/no-primary/multi-primary cluster validation, server has no external prereqs"
ours         = "src/role.rs::tests"

[[spec_test]]
designed_for = "Shutdown = exact reverse of bring-up (kine torn down last; proxy before kubelet; apiserver before kine), safety predicate accepts the computed order and rejects a bad/wrong-membership order, agent shutdown with external apiserver"
ours         = "src/shutdown.rs::tests"

# ---- no-backcompat (Charter §8) ---------------------------------------------
# Recorded explicitly so the stance is auditable: this crate models the current
# K3s bootstrap contract only. No pre-Linux-5.0 / Windows bring-up path and no
# historical (pre-kine / etcd-only) datastore-default mode are carried; the
# relevant items are listed as `permanent` [[unmapped]] above.
