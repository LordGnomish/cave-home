[package]
name              = "cave-home-kine-rs"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace   = true
description = "cave-home-kine-rs — etcd-compatible SQLite/Postgres-backed datastore (K3s's single-binary trick); upstream: k3s-io/kine; port method: spec-based behavioural reimplementation of etcd-MVCC + kine semantics (not verbatim line-by-line) (Orchestration Phase 3, ADR-004)"

[package.metadata.cave-home]
upstream    = "k3s-io/kine"
port-method = "spec-based (behavioural reimplementation of etcd-MVCC + kine semantics; NOT verbatim line-by-line)"
phase       = "orchestration-phase-3"

[features]
# The pure decision core has no deps; storage backends and the gRPC transport
# are opt-in so the default build (and the single binary) stays lean. SQLite is
# k3s's default datastore, so it is on by default.
default  = ["sqlite"]
sqlite   = ["dep:rusqlite"]
# The etcd gRPC transport (tonic). Needs a backend to serve; defaults to SQLite.
grpc     = ["dep:tonic", "dep:prost", "dep:tokio", "dep:tokio-stream", "dep:async-trait", "dep:async-stream", "dep:tonic-build", "sqlite"]

[dependencies]
# Embedded, bundled SQLite — compiled into the binary, no server, one file.
rusqlite     = { version = "0.32", features = ["bundled"], optional = true }
# etcd gRPC transport stack (all cached; pure-Rust, single-binary friendly).
tonic        = { version = "0.12", optional = true }
prost        = { version = "0.13", optional = true }
tokio        = { version = "1", features = ["rt-multi-thread", "sync", "macros", "net", "time"], optional = true }
tokio-stream = { version = "0.1", features = ["net"], optional = true }
async-trait  = { version = "0.1", optional = true }
async-stream = { version = "0.3", optional = true }

[build-dependencies]
tonic-build = { version = "0.12", optional = true }

[lints]
workspace = true
