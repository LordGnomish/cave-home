# cave-home-hue-bridge-emu — CLEAN-ROOM reimplementation manifest.
#
# Per ADR-010 + Charter §6.1: the conceptual upstream `diyhue/diyHue` is
# GPL-3.0, so cave-home-hue-bridge-emu is implemented strictly from
# Philips Hue developer-portal v1 + v2 public documentation. **diyHue
# source has not been read.** Contributor recusal applies (CONTRIBUTING.md)
# and every `.rs` file under this crate carries the clean-room banner:
#   // CLEAN-ROOM: Philips Hue CLIP API v1+v2 public docs reference only.
#   // Upstream diyHue source NOT consulted. GPL contamination prevented by design.
#
# Honest scoping: a full feature-parity Hue Bridge emulation (rule engine,
# schedules, behaviour scripts, Entertainment DTLS streaming, the v2
# resource long-tail of behavior_instance / smart_scene / motion-area /
# bell_button / camera_motion) is comparable in size to ~25 kLOC of
# production logic. Phase 1 MVP ships the slice the headline persona
# actually needs to retire a physical Hue Bridge — pairing, lights,
# groups, scenes (recall), rooms/zones, grouped_light, the EventStream,
# UPnP SSDP discovery, mDNS payload. The longer tail is enumerated in
# `[[unmapped]]` for Phase 1b / 2.

[crate]
name             = "cave-home-hue-bridge-emu"
port_method      = "clean-room"
ported_at        = "2026-05-17"
linux_min_kernel = "7.1"
adr              = "ADR-010"
gpl_quarantine   = "diyhue/diyHue (GPL-3.0) — REFERENCE ONLY (concept); source NOT read"

[spec_sources]
hue_api_v1     = "https://developers.meethue.com/develop/hue-api/"
hue_api_v2     = "https://developers.meethue.com/develop/hue-api-v2/"
discovery      = "https://developers.meethue.com/develop/application-design-guidance/hue-bridge-discovery/"
error_messages = "https://developers.meethue.com/documentation/error-messages"
eventstream    = "https://developers.meethue.com/develop/hue-api-v2/core-concepts/#eventstream"
clip_schema    = "https://developers.meethue.com/develop/hue-api-v2/api-reference/ (clip-api.schema.json definitions)"

[ratios]
# Production src LOC: ~1.65 kLOC (everything outside `#[cfg(test)]`).
# Honest scope baseline = ~3.3 kLOC of "Phase 1 emulator surface" by
# our own accounting (the published v1 endpoint set + v2 light + scene
# + room/zone + grouped_light + bridge + eventstream + SSDP + mDNS).
# fill_ratio is the headline production-port ratio against that baseline.
# Against a *full* Hue Bridge feature parity baseline (~25 kLOC), the
# fill ratio is ~0.07 — Phase 1 is deliberately the most-used surfaces.
fill_ratio              = 0.50
fill_ratio_basis        = "phase-1 MVP scope (pairing + v1 lights/groups/scenes/sensors/config + v2 lights/scenes/rooms/zones/grouped_light/bridge + eventstream + UPnP SSDP + mDNS)"
fill_ratio_full_stack   = 0.07
test_port_ratio         = 0.0     # clean-room: tests are designed from spec, NOT ported

# ---- spec_section (clean-room reimpl present in this crate) ----------------

