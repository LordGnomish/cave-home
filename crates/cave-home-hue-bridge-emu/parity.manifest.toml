ours = "src/pairing.rs::PairingService::try_pair"

[[spec_section]]
spec = "Hue API v1 §7.2 Configuration GET — short + full forms"
ours = "src/api/v1/views.rs::short_config + full_config"

[[spec_section]]
spec = "Hue API v1 §1 Lights — list / get / set state"
ours = "src/api/v1/mod.rs::{get_lights, get_light, put_light_state}"

[[spec_section]]
spec = "Hue API v1 §4 Groups — list + group action / scene recall"
ours = "src/api/v1/mod.rs::{get_groups, put_group_action}"

[[spec_section]]
spec = "Hue API v1 §5 Scenes — list"
ours = "src/api/v1/mod.rs::get_scenes"

[[spec_section]]
spec = "Hue API v1 §2 Sensors — list"
ours = "src/api/v1/mod.rs::get_sensors"

[[spec_section]]
spec = "Hue API v2 envelope `{errors, data}` (developer-portal global)"
ours = "src/api/v2/mod.rs::Envelope"

[[spec_section]]
spec = "Hue API v2 #resource_light_get / _put — light JSON schema"
ours = "src/api/v2/views.rs::light_view + src/api/v2/mod.rs::put_light"

[[spec_section]]
spec = "Hue API v2 #resource_scene + recall"
ours = "src/api/v2/mod.rs::{get_scenes, put_scene}"

[[spec_section]]
spec = "Hue API v2 #resource_room / #resource_zone"
ours = "src/api/v2/views.rs::room_or_zone_view + src/api/v2/mod.rs::{get_rooms, get_zones}"

[[spec_section]]
spec = "Hue API v2 #resource_grouped_light"
ours = "src/api/v2/views.rs::grouped_light_for_group"

[[spec_section]]
spec = "Hue API v2 #resource_bridge — singleton bridge resource"
ours = "src/api/v2/views.rs::bridge_view + src/api/v2/mod.rs::get_bridge"

[[spec_section]]
spec = "Hue API v2 Core Concepts — EventStream / SSE format"
ours = "src/api/v2/eventstream.rs::render_event + src/registry.rs::StreamEvent broadcaster"

[[spec_section]]
spec = "Hue developer-portal — Bridge discovery → SSDP description.xml"
ours = "src/discovery/ssdp.rs::build_description_xml + build_ssdp_response_root"

[[spec_section]]
spec = "Hue developer-portal — Bridge discovery → mDNS _hue._tcp advertisement"
ours = "src/discovery/mdns.rs::build_advertisement"

[[spec_section]]
spec = "Hue developer-portal — Error messages (type codes 1, 2, 3, 5, 6, 7, 8, 11, 101, 901)"
ours = "src/errors.rs::HueProtocolError + error_type::*"

[[spec_section]]
spec = "Hue bridge identity (bridgeid, mac, UDN) — developer-portal discovery"
ours = "src/config.rs::BridgeIdentity"

